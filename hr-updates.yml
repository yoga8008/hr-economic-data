name: Update Global HR Hub

on:
  schedule:
    # 06:00 Taiwan time every day (22:00 UTC)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-hr-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch HR updates
        run: python scripts/fetch_hr_updates.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hr-updates.json
          if git diff --cached --quiet; then
            echo "No HR update changes."
          else
            git commit -m "chore: update Global HR Hub data"
            git push
          fi
