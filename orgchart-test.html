<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>組織圖測試版</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial, "Microsoft JhengHei", sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
    color:#111827;
}

h1{
    margin:0 0 10px 0;
}

.desc{
    color:#6b7280;
    margin-bottom:20px;
}

.topGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:#ffffff;
    border:1px solid #d1d5db;
    border-radius:14px;
    padding:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.card h2{
    margin:0 0 12px 0;
    font-size:18px;
}

button{
    border:0;
    background:#1e3a8a;
    color:#fff;
    border-radius:10px;
    padding:10px 18px;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    opacity:.9;
}

button.secondary{
    background:#e5e7eb;
    color:#111827;
}

button.danger{
    background:#991b1b;
}

input[type="file"],
input[type="text"],
input[type="password"],
select{
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:10px 12px;
    font-size:15px;
    background:#fff;
}

input[type="text"]{
    min-width:220px;
}

label{
    display:inline-flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    font-weight:600;
}

.smallText{
    color:#6b7280;
    font-size:13px;
    line-height:1.6;
}

.message{
    margin-top:10px;
    color:#1e3a8a;
    font-weight:bold;
}

.error{
    color:#b91c1c;
    font-weight:bold;
}

.success{
    color:#047857;
    font-weight:bold;
}

.optionArea{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

.optionGroup{
    margin-top:14px;
}

.optionTitle{
    font-weight:bold;
    margin-bottom:8px;
}

.checkboxPill{
    background:#f9fafb;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:8px 10px;
}

.mainArea{
    margin-top:20px;
}

/* ===============================
   組織圖區域
================================ */
.chartBox{
    background:#ffffff;
    border:1px solid #d1d5db;
    border-radius:16px;
    padding:0;
    overflow:hidden;
}

/* 外層可水平捲動 */
.chartScroll{
    overflow:auto;
    max-height:calc(100vh - 40px);
    position:relative;
    background:#ffffff;
}

/* ===============================
   上方功能列：浮動固定
================================ */
.chartHeader{
    position:sticky;
    top:0;
    left:0;
    z-index:999;
    background:#ffffff;
    border-bottom:1px solid #e5e7eb;
    padding:12px 14px;
}

/* 往右滑時仍固定在可視畫面左側 */
.chartHeaderInner{
    position:sticky;
    left:0;
    z-index:1000;

    width:calc(100vw - 90px);
    max-width:calc(100vw - 90px);

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:nowrap;
}

.chartActions,
.viewActions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
}

.chartHeader button,
.chartHeader select,
.chartHeader label,
.chartHeader input{
    white-space:nowrap;
}

.segment{
    display:inline-flex;
    align-items:center;
    background:#f3f4f6;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:6px;
    gap:4px;
}

.segment button{
    background:transparent;
    color:#374151;
    padding:8px 14px;
    border-radius:10px;
}

.segment button.active{
    background:#1e3a8a;
    color:#fff;
}

.zoomBox{
    display:flex;
    align-items:center;
    gap:10px;
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:8px 14px;
}

.zoomBox input[type="range"]{
    width:140px;
}

#zoomValue{
    font-size:18px;
    min-width:54px;
}

/* ===============================
   組織圖本體
================================ */
.chartBody{
    padding:30px;
    min-width:max-content;
}

.zoomWrap{
    transform-origin:top center;
    transition:.15s;
    display:inline-block;
    min-width:100%;
}

.orgChart{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-width:max-content;
}

.orgNodeWrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
}

.orgNode{
    width:260px;
    min-height:128px;
    background:#ffffff;
    border:1px solid #cbd5e1;
    border-radius:12px;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
    padding:14px;
    box-sizing:border-box;
    cursor:pointer;
}

.orgNode:hover{
    border-color:#1e3a8a;
    box-shadow:0 4px 12px rgba(30,58,138,.18);
}

.orgTitle{
    text-align:center;
    font-weight:bold;
    font-size:16px;
    margin-bottom:10px;
}

.orgInfo{
    font-size:13px;
    line-height:1.6;
    color:#374151;
}

.orgPeople{
    border-top:1px dashed #cbd5e1;
    margin-top:8px;
    padding-top:8px;
    font-size:13px;
    color:#1e3a8a;
    font-weight:bold;
}

.orgPeople a{
    color:#1e3a8a;
}

.toggleMark{
    font-size:12px;
    color:#6b7280;
    text-align:center;
    margin-top:6px;
}

.children{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-start;
    gap:28px 32px;
    margin-top:42px;
    position:relative;
}

.children.compact{
    margin-left:auto;
    margin-right:auto;
}

.children .orgNodeWrap{
    flex:0 0 260px;
}

/* 父節點往下線 */
.orgNodeWrap.hasChildren > .orgNode::after{
    content:"";
    position:absolute;
    left:50%;
    top:100%;
    width:1px;
    height:22px;
    background:#94a3b8;
}

/* 子群組上方橫線 */
.children::before{
    content:"";
    position:absolute;
    top:-20px;
    left:0;
    right:0;
    height:1px;
    background:#94a3b8;
}

/* 每個子節點往上線 */
.children > .orgNodeWrap::before{
    content:"";
    position:absolute;
    top:-20px;
    left:50%;
    width:1px;
    height:20px;
    background:#94a3b8;
}

.pathDim{
    opacity:.25;
}

.hidden{
    display:none !important;
}

/* ===============================
   樹狀清單
================================ */
.treeList{
    background:#ffffff;
    padding:20px;
    min-width:900px;
}

.treeItem{
    border-left:3px solid #d1d5db;
    margin:4px 0;
    padding:8px 10px;
    background:#f9fafb;
    border-radius:8px;
    font-size:14px;
}

.treeTitle{
    font-weight:bold;
    color:#111827;
}

.treeMeta{
    color:#4b5563;
    font-size:13px;
    margin-top:4px;
}

/* ===============================
   匯出用
================================ */
.exporting .chartHeader{
    display:none !important;
}

.exporting .chartScroll{
    overflow:visible !important;
    max-height:none !important;
}

.exporting .chartBody{
    padding:20px !important;
}

/* RWD */
@media(max-width:900px){
    body{
        padding:16px;
    }

    .topGrid{
        grid-template-columns:1fr;
    }

    .chartHeaderInner{
        width:calc(100vw - 40px);
        max-width:calc(100vw - 40px);
        align-items:flex-start;
        flex-direction:column;
    }

    .chartActions,
    .viewActions{
        flex-wrap:wrap;
    }
}
</style>
</head>

<body>

<h1>組織圖測試版</h1>
<div class="desc">上傳 Excel 後，可查詢組織圖、樹狀清單、搜尋、篩選、縮放與匯出 PDF。</div>

<div class="topGrid">

    <div class="card">
        <h2>一、上傳組織資料</h2>

        <input type="file" id="excelFile" accept=".xlsx,.xls">
        <button onclick="downloadTemplate()">下載上傳範本</button>
        <button class="danger" onclick="clearSavedData()">清除記憶</button>

        <div id="uploadMsg" class="message"></div>

        <div class="smallText" style="margin-top:12px;">
            必要欄位：公司代碼、層級、上級部門、部門代碼、費用代碼、部門全名、主管一姓名、主管一職稱、在職人數
        </div>

        <div id="savedInfo" class="smallText" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <h2>二、上傳結果</h2>
        <div id="resultArea" class="smallText">尚未上傳資料。</div>
    </div>

</div>

<div class="card">
    <h2>三、篩選與顯示設定</h2>

    <div class="optionGroup">
        <div class="optionTitle">法人 / 公司代碼</div>
        <div id="legalFilters" class="optionArea"></div>
    </div>

    <div class="optionGroup">
        <div class="optionTitle">層級</div>
        <div id="levelFilters" class="optionArea"></div>
    </div>

    <div class="optionGroup">
        <div class="optionTitle">顯示資訊</div>
        <div id="fieldFilters" class="optionArea">
            <label class="checkboxPill"><input type="checkbox" value="supervisor" checked onchange="renderAll()"> 主管</label>
            <label class="checkboxPill"><input type="checkbox" value="level" checked onchange="renderAll()"> 層級</label>
            <label class="checkboxPill"><input type="checkbox" value="deptCode" checked onchange="renderAll()"> 部門代碼</label>
            <label class="checkboxPill"><input type="checkbox" value="costCode" checked onchange="renderAll()"> 費用代碼</label>
        </div>
    </div>

    <div class="optionGroup">
        <div class="optionTitle">排序</div>
        <select id="sortMode" onchange="renderAll()">
            <option value="original">原始順序</option>
            <option value="level">層級</option>
            <option value="name">名稱</option>
            <option value="deptCode">部門代碼</option>
        </select>
    </div>
</div>

<div class="mainArea">
    <div class="chartBox">
        <div class="chartScroll" id="chartScroll">

            <div class="chartHeader">
                <div class="chartHeaderInner">

                    <div class="chartActions">
                        <input type="text" id="searchInput" placeholder="搜尋部門 / 主管 / 代碼">

                        <label class="checkboxPill">
                            <input type="checkbox" id="includeChildren" onchange="renderAll()">
                            搜尋結果及轄下
                        </label>

                        <label class="checkboxPill">
                            <input type="checkbox" id="hideZero" onchange="renderAll()">
                            隱藏含轄下合計：0 人
                        </label>

                        <button onclick="renderAll()">搜尋</button>
                        <button onclick="expandAll()">全部展開</button>
                        <button onclick="collapseAll()">全部收合</button>
                    </div>

                    <div class="viewActions">

                        <div class="segment">
                            <span style="font-weight:bold;padding:0 8px;">呈現方式：</span>
                            <button id="treeModeBtn" onclick="setViewMode('tree')">樹狀清單</button>
                            <button id="chartModeBtn" onclick="setViewMode('chart')" class="active">組織圖</button>
                        </div>

                        <div class="zoomBox">
                            <strong>縮放：</strong>
                            <input type="range" id="zoomRange" min="50" max="150" value="100" oninput="updateZoom()">
                            <span id="zoomValue">100%</span>
                        </div>

                        <select id="exportMode">
                            <option value="current">匯出模式：目前畫面</option>
                            <option value="fit">匯出模式：自動縮放一頁</option>
                            <option value="long">匯出模式：長版 PDF</option>
                            <option value="firstLevel">匯出模式：依第一層子部門分頁</option>
                        </select>

                        <button onclick="exportPDF()">匯出 PDF</button>
                    </div>

                </div>
            </div>

            <div class="chartBody" id="chartBody">
                <div id="zoomWrap" class="zoomWrap">
                    <div id="orgChart" class="orgChart"></div>
                    <div id="treeList" class="treeList hidden"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const requiredColumns = [
    "公司代碼","層級","上級部門","部門代碼","費用代碼",
    "部門全名","主管一姓名","主管一職稱","在職人數"
];

const STORAGE_KEY_ROWS = "orgChartSavedRows";
const STORAGE_KEY_FILE = "orgChartFileName";
const STORAGE_KEY_UPDATED_AT = "orgChartUpdatedAt";
const STORAGE_KEY_VIEW_MODE = "orgChartViewMode";

const ADMIN_PASSWORD = "1234";

let rawRows = [];
let allNodes = [];
let rootNodes = [];
let nodeMap = new Map();
let expandedSet = new Set();
let currentViewMode = localStorage.getItem(STORAGE_KEY_VIEW_MODE) || "chart";

document.getElementById("excelFile").addEventListener("change", handleExcelUpload);
document.getElementById("searchInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") renderAll();
});

window.addEventListener("load", function(){
    loadSavedData();
    setViewMode(currentViewMode, false);
});

/* ===============================
   Excel 上傳
================================ */
function handleExcelUpload(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});

        if(!rows.length){
            document.getElementById("uploadMsg").innerHTML = `<span class="error">Excel 沒有資料。</span>`;
            return;
        }

        const missing = requiredColumns.filter(col => !(col in rows[0]));

        if(missing.length){
            document.getElementById("uploadMsg").innerHTML =
                `<span class="error">缺少欄位：${missing.join("、")}</span>`;
            return;
        }

        rawRows = rows.map((r, index) => normalizeRow(r, index));

        localStorage.setItem(STORAGE_KEY_ROWS, JSON.stringify(rawRows));
        localStorage.setItem(STORAGE_KEY_FILE, file.name);
        localStorage.setItem(STORAGE_KEY_UPDATED_AT, new Date().toLocaleString("zh-TW"));

        document.getElementById("uploadMsg").innerHTML =
            `<span class="success">讀取成功：${rows.length} 筆</span>`;

        buildData();
        renderFilterOptions();
        renderAll();
        updateSavedInfo();
    };

    reader.readAsArrayBuffer(file);
}

function normalizeRow(r, index){
    return {
        companyCode: String(r["公司代碼"] || "").trim(),
        level: String(r["層級"] || "").trim(),
        parentDept: String(r["上級部門"] || "").trim(),
        deptCode: String(r["部門代碼"] || "").trim(),
        costCode: String(r["費用代碼"] || "").trim(),
        deptName: String(r["部門全名"] || "").trim(),
        supervisorName: String(r["主管一姓名"] || "").trim(),
        supervisorTitle: String(r["主管一職稱"] || "").trim(),
        ownPeople: Number(r["在職人數"] || 0),
        rowIndex:index
    };
}

/* ===============================
   記憶功能
================================ */
function loadSavedData(){
    const saved = localStorage.getItem(STORAGE_KEY_ROWS);

    if(saved){
        try{
            rawRows = JSON.parse(saved);
            buildData();
            renderFilterOptions();
            renderAll();
            updateSavedInfo();

            document.getElementById("uploadMsg").innerHTML =
                `<span class="success">已載入上次上傳資料。</span>`;
        }catch(e){
            console.error(e);
        }
    }
}

function updateSavedInfo(){
    const fileName = localStorage.getItem(STORAGE_KEY_FILE);
    const updatedAt = localStorage.getItem(STORAGE_KEY_UPDATED_AT);

    if(fileName && updatedAt){
        document.getElementById("savedInfo").innerHTML =
            `目前記憶檔案：<b>${fileName}</b><br>更新日：<b>${updatedAt}</b>`;
    }else{
        document.getElementById("savedInfo").innerHTML = "";
    }
}

function clearSavedData(){
    const pwd = prompt("請輸入清除密碼");

    if(pwd !== ADMIN_PASSWORD){
        alert("密碼錯誤");
        return;
    }

    localStorage.removeItem(STORAGE_KEY_ROWS);
    localStorage.removeItem(STORAGE_KEY_FILE);
    localStorage.removeItem(STORAGE_KEY_UPDATED_AT);

    rawRows = [];
    allNodes = [];
    rootNodes = [];
    nodeMap.clear();
    expandedSet.clear();

    document.getElementById("orgChart").innerHTML = "";
    document.getElementById("treeList").innerHTML = "";
    document.getElementById("levelFilters").innerHTML = "";
    document.getElementById("legalFilters").innerHTML = "";
    document.getElementById("resultArea").innerHTML = "尚未上傳資料。";
    document.getElementById("savedInfo").innerHTML = "";
    document.getElementById("uploadMsg").innerHTML = `<span class="success">已清除記憶。</span>`;
}

/* ===============================
   建資料
================================ */
function buildData(){
    nodeMap = new Map();
    allNodes = [];
    rootNodes = [];
    expandedSet = new Set();

    rawRows.forEach(row => {
        const node = {
            ...row,
            children:[],
            parent:null,
            totalPeople:0
        };

        allNodes.push(node);

        if(node.deptCode){
            nodeMap.set(node.deptCode, node);
        }
    });

    allNodes.forEach(node => {
        const parentKey = node.parentDept;
        const parent = nodeMap.get(parentKey);

        if(parent && parent !== node){
            node.parent = parent;
            parent.children.push(node);
        }else{
            rootNodes.push(node);
        }
    });

    sortChildren(rootNodes);
    calcTotalPeople(rootNodes);

    allNodes.forEach(n => expandedSet.add(n.deptCode));

    checkData();
}

function sortChildren(nodes){
    const sortMode = document.getElementById("sortMode")?.value || "original";

    nodes.sort((a,b) => {
        if(sortMode === "name"){
            return a.deptName.localeCompare(b.deptName, "zh-Hant");
        }

        if(sortMode === "deptCode"){
            return a.deptCode.localeCompare(b.deptCode);
        }

        if(sortMode === "level"){
            return Number(a.level || 0) - Number(b.level || 0) || a.rowIndex - b.rowIndex;
        }

        return a.rowIndex - b.rowIndex;
    });

    nodes.forEach(n => sortChildren(n.children));
}

function calcTotalPeople(nodes){
    nodes.forEach(node => {
        node.totalPeople = node.ownPeople + calcChildrenPeople(node);
    });
}

function calcChildrenPeople(node){
    let total = 0;

    node.children.forEach(child => {
        total += child.ownPeople + calcChildrenPeople(child);
    });

    return total;
}

function checkData(){
    const messages = [];

    const codeCount = {};
    rawRows.forEach(r => {
        if(!r.deptCode) messages.push(`第 ${r.rowIndex + 2} 列缺少部門代碼`);
        codeCount[r.deptCode] = (codeCount[r.deptCode] || 0) + 1;
    });

    Object.keys(codeCount).forEach(code => {
        if(code && codeCount[code] > 1){
            messages.push(`部門代碼重複：${code}`);
        }
    });

    rawRows.forEach(r => {
        if(r.parentDept && r.parentDept !== "HH" && !nodeMap.has(r.parentDept)){
            messages.push(`找不到上級部門：${r.deptName} / 上級部門 ${r.parentDept}`);
        }
    });

    let html = "";
    html += `資料筆數：<b>${rawRows.length}</b><br>`;
    html += `根節點數：<b>${rootNodes.length}</b><br>`;

    if(messages.length){
        html += `<br><span class="error">資料提醒：</span><br>`;
        html += messages.map(m => `・${m}`).join("<br>");
    }else{
        html += `<br><span class="success">資料檢查無明顯異常。</span>`;
    }

    document.getElementById("resultArea").innerHTML = html;
}

/* ===============================
   篩選選項
================================ */
function renderFilterOptions(){
    renderLegalFilters();
    renderLevelFilters();
}

function renderLegalFilters(){
    const box = document.getElementById("legalFilters");
    box.innerHTML = "";

    const values = [...new Set(rawRows.map(r => r.companyCode).filter(Boolean))];

    values.forEach(v => {
        const label = document.createElement("label");
        label.className = "checkboxPill";
        label.innerHTML = `<input type="checkbox" value="${escapeHtml(v)}" checked onchange="renderAll()"> ${escapeHtml(v)}`;
        box.appendChild(label);
    });
}

function renderLevelFilters(){
    const box = document.getElementById("levelFilters");
    box.innerHTML = "";

    const values = [...new Set(rawRows.map(r => r.level).filter(Boolean))]
        .sort((a,b) => Number(a) - Number(b));

    values.forEach(v => {
        const label = document.createElement("label");
        label.className = "checkboxPill";
        label.innerHTML = `<input type="checkbox" value="${escapeHtml(v)}" checked onchange="renderAll()"> 層級 ${escapeHtml(v)}`;
        box.appendChild(label);
    });
}

/* ===============================
   顯示設定
================================ */
function getCheckedValues(containerId){
    return [...document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`)]
        .map(i => i.value);
}

function getVisibleFields(){
    return getCheckedValues("fieldFilters");
}

function getSelectedLegals(){
    return getCheckedValues("legalFilters");
}

function getSelectedLevels(){
    return getCheckedValues("levelFilters");
}

/* ===============================
   主要渲染
================================ */
function renderAll(){
    if(!rawRows.length) return;

    sortChildren(rootNodes);
    calcTotalPeople(rootNodes);

    if(currentViewMode === "tree"){
        renderTreeList();
    }else{
        renderOrgChart();
    }

    updateModeButtons();
}

function nodePassBasicFilter(node){
    const legals = getSelectedLegals();
    const levels = getSelectedLevels();
    const hideZero = document.getElementById("hideZero").checked;

    if(legals.length && !legals.includes(node.companyCode)) return false;
    if(levels.length && !levels.includes(node.level)) return false;
    if(hideZero && node.totalPeople === 0) return false;

    return true;
}

function getSearchText(){
    return document.getElementById("searchInput").value.trim().toLowerCase();
}

function nodeMatchesSearch(node, keyword){
    if(!keyword) return true;

    const text = [
        node.companyCode,
        node.level,
        node.parentDept,
        node.deptCode,
        node.costCode,
        node.deptName,
        node.supervisorName,
        node.supervisorTitle
    ].join(" ").toLowerCase();

    return text.includes(keyword);
}

function hasMatchedDescendant(node, keyword){
    return node.children.some(child => {
        return nodeMatchesSearch(child, keyword) || hasMatchedDescendant(child, keyword);
    });
}

function isDescendantOfMatched(node, keyword){
    let p = node.parent;

    while(p){
        if(nodeMatchesSearch(p, keyword)) return true;
        p = p.parent;
    }

    return false;
}

function shouldShowNode(node){
    const keyword = getSearchText();
    const includeChildren = document.getElementById("includeChildren").checked;

    if(!nodePassBasicFilter(node)) return false;

    if(!keyword) return true;

    if(nodeMatchesSearch(node, keyword)) return true;

    if(includeChildren && isDescendantOfMatched(node, keyword)) return true;

    if(hasMatchedDescendant(node, keyword)) return true;

    return false;
}

/* ===============================
   子部門欄數規則
================================ */
function getBestColumnCount(count){
    if(count <= 4) return count;

    if(count === 5) return 3;
    if(count === 6) return 3;
    if(count === 7) return 4;
    if(count === 8) return 4;
    if(count === 9) return 5;
    if(count === 10) return 5;

    return 5;
}

/* ===============================
   組織圖
================================ */
function renderOrgChart(){
    const org = document.getElementById("orgChart");
    const tree = document.getElementById("treeList");

    org.classList.remove("hidden");
    tree.classList.add("hidden");

    org.innerHTML = "";

    const visibleRoots = rootNodes.filter(n => shouldShowNode(n));

    if(!visibleRoots.length){
        org.innerHTML = `<div class="smallText">查無符合資料。</div>`;
        return;
    }

    visibleRoots.forEach(root => {
        org.appendChild(renderOrgNode(root));
    });
}

function renderOrgNode(node){
    const wrap = document.createElement("div");
    wrap.className = "orgNodeWrap";

    const visibleChildren = node.children.filter(child => shouldShowNode(child));

    if(visibleChildren.length){
        wrap.classList.add("hasChildren");
    }

    const card = document.createElement("div");
    card.className = "orgNode";
    card.onclick = function(e){
        e.stopPropagation();
        toggleNode(node);
    };

    card.innerHTML = buildNodeHtml(node);
    wrap.appendChild(card);

    if(node.children.length){
        const mark = document.createElement("div");
        mark.className = "toggleMark";
        mark.innerText = expandedSet.has(node.deptCode) ? "點擊收合" : "點擊展開";
        wrap.appendChild(mark);
    }

    if(visibleChildren.length && expandedSet.has(node.deptCode)){
        const childrenDiv = document.createElement("div");
        childrenDiv.className = "children compact";

        const childCount = visibleChildren.length;
        const cols = getBestColumnCount(childCount);

        childrenDiv.style.maxWidth = (cols * 292) + "px";

        visibleChildren.forEach(child => {
            childrenDiv.appendChild(renderOrgNode(child));
        });

        wrap.appendChild(childrenDiv);
    }

    return wrap;
}

function buildNodeHtml(node){
    const fields = getVisibleFields();

    let html = "";
    html += `<div class="orgTitle">${escapeHtml(node.deptName || "-")}</div>`;
    html += `<div class="orgInfo">`;

    if(fields.includes("supervisor")){
        const supervisor = node.supervisorName || "-";
        const title = node.supervisorTitle || "-";
        html += `主管：${escapeHtml(supervisor)} / ${escapeHtml(title)}<br>`;
    }

    if(fields.includes("level")){
        html += `層級：${escapeHtml(node.level || "-")}<br>`;
    }

    if(fields.includes("deptCode")){
        html += `部門代碼：${escapeHtml(node.deptCode || "-")}<br>`;
    }

    if(fields.includes("costCode")){
        html += `費用代碼：${escapeHtml(node.costCode || "-")}<br>`;
    }

    html += `</div>`;

    html += `
        <div class="orgPeople">
            本單位人數：<a href="javascript:void(0)">${node.ownPeople || 0} 人</a><br>
            含轄下合計：<a href="javascript:void(0)">${node.totalPeople || 0} 人</a>
        </div>
    `;

    return html;
}

function toggleNode(node){
    if(!node.deptCode) return;

    if(expandedSet.has(node.deptCode)){
        expandedSet.delete(node.deptCode);
    }else{
        expandedSet.add(node.deptCode);
    }

    renderAll();
}

/* ===============================
   樹狀清單
================================ */
function renderTreeList(){
    const org = document.getElementById("orgChart");
    const tree = document.getElementById("treeList");

    org.classList.add("hidden");
    tree.classList.remove("hidden");

    tree.innerHTML = "";

    const visibleRoots = rootNodes.filter(n => shouldShowNode(n));

    if(!visibleRoots.length){
        tree.innerHTML = `<div class="smallText">查無符合資料。</div>`;
        return;
    }

    visibleRoots.forEach(root => {
        renderTreeNode(root, tree, 0);
    });
}

function renderTreeNode(node, container, depth){
    if(!shouldShowNode(node)) return;

    const item = document.createElement("div");
    item.className = "treeItem";
    item.style.marginLeft = `${depth * 28}px`;

    item.innerHTML = `
        <div class="treeTitle">${escapeHtml(node.deptName || "-")}</div>
        <div class="treeMeta">
            公司代碼：${escapeHtml(node.companyCode || "-")}
            ｜層級：${escapeHtml(node.level || "-")}
            ｜部門代碼：${escapeHtml(node.deptCode || "-")}
            ｜費用代碼：${escapeHtml(node.costCode || "-")}
            ｜主管：${escapeHtml(node.supervisorName || "-")} / ${escapeHtml(node.supervisorTitle || "-")}
            ｜本單位：${node.ownPeople || 0} 人
            ｜含轄下：${node.totalPeople || 0} 人
        </div>
    `;

    container.appendChild(item);

    if(expandedSet.has(node.deptCode)){
        node.children.forEach(child => renderTreeNode(child, container, depth + 1));
    }
}

/* ===============================
   展開 / 收合
================================ */
function expandAll(){
    allNodes.forEach(n => {
        if(n.deptCode) expandedSet.add(n.deptCode);
    });

    renderAll();
}

function collapseAll(){
    expandedSet.clear();

    rootNodes.forEach(n => {
        if(n.deptCode) expandedSet.add(n.deptCode);
    });

    renderAll();
}

/* ===============================
   呈現模式
================================ */
function setViewMode(mode, needRender = true){
    currentViewMode = mode;
    localStorage.setItem(STORAGE_KEY_VIEW_MODE, mode);

    updateModeButtons();

    if(needRender){
        renderAll();
    }
}

function updateModeButtons(){
    const treeBtn = document.getElementById("treeModeBtn");
    const chartBtn = document.getElementById("chartModeBtn");

    treeBtn.classList.toggle("active", currentViewMode === "tree");
    chartBtn.classList.toggle("active", currentViewMode === "chart");
}

/* ===============================
   縮放
================================ */
function updateZoom(){
    const value = document.getElementById("zoomRange").value;
    document.getElementById("zoomValue").innerText = value + "%";
    document.getElementById("zoomWrap").style.transform = `scale(${value / 100})`;
}

/* ===============================
   PDF 匯出
================================ */
async function exportPDF(){
    const mode = document.getElementById("exportMode").value;

    if(mode === "firstLevel"){
        await exportByFirstLevel();
        return;
    }

    await exportSinglePDF(mode);
}

async function exportSinglePDF(mode){
    const { jsPDF } = window.jspdf;
    const target = document.getElementById("chartBody");
    const oldZoom = document.getElementById("zoomWrap").style.transform;

    document.body.classList.add("exporting");

    if(mode === "fit" || mode === "long"){
        document.getElementById("zoomWrap").style.transform = "scale(1)";
    }

    await delay(300);

    const canvas = await html2canvas(target, {
        scale:2,
        useCORS:true,
        backgroundColor:"#ffffff"
    });

    const imgData = canvas.toDataURL("image/png");

    let pdf;

    if(mode === "long"){
        const pdfWidth = 297;
        const pdfHeight = canvas.height * pdfWidth / canvas.width;
        pdf = new jsPDF("l", "mm", [pdfWidth, pdfHeight]);
        pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
    }else{
        pdf = new jsPDF("l", "mm", "a4");

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        let imgWidth = pageWidth;
        let imgHeight = canvas.height * imgWidth / canvas.width;

        if(mode === "fit"){
            if(imgHeight > pageHeight){
                imgHeight = pageHeight;
                imgWidth = canvas.width * imgHeight / canvas.height;
            }
        }

        const x = (pageWidth - imgWidth) / 2;
        const y = 10;

        pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
    }

    pdf.save("組織圖.pdf");

    document.getElementById("zoomWrap").style.transform = oldZoom;
    document.body.classList.remove("exporting");
}

async function exportByFirstLevel(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("l", "mm", "a4");
    const target = document.getElementById("chartBody");

    if(!rootNodes.length){
        alert("沒有資料可匯出");
        return;
    }

    const originalRootNodes = [...rootNodes];
    const originalMode = currentViewMode;

    document.body.classList.add("exporting");
    setViewMode("chart", false);

    let pageIndex = 0;

    for(const root of originalRootNodes){
        for(const child of root.children){
            document.getElementById("orgChart").innerHTML = "";
            document.getElementById("orgChart").appendChild(renderOrgNode(child));

            await delay(300);

            const canvas = await html2canvas(target, {
                scale:2,
                useCORS:true,
                backgroundColor:"#ffffff"
            });

            const imgData = canvas.toDataURL("image/png");

            if(pageIndex > 0) pdf.addPage();

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();

            let imgWidth = pageWidth;
            let imgHeight = canvas.height * imgWidth / canvas.width;

            if(imgHeight > pageHeight){
                imgHeight = pageHeight;
                imgWidth = canvas.width * imgHeight / canvas.height;
            }

            const x = (pageWidth - imgWidth) / 2;
            const y = 10;

            pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
            pageIndex++;
        }
    }

    pdf.save("組織圖_依第一層子部門分頁.pdf");

    document.body.classList.remove("exporting");
    setViewMode(originalMode, true);
}

/* ===============================
   工具
================================ */
function escapeHtml(text){
    return String(text ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function delay(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}
