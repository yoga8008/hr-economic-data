<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>組織圖測試版</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
    color:#111827;
}

h1{
    margin-bottom:10px;
}

.desc{
    color:#666;
    margin-bottom:20px;
}

.topGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    align-items:stretch;
    margin-bottom:20px;
}

.uploadBox,
.resultArea{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    min-height:120px;
    box-sizing:border-box;
}

.uploadActions{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
}

.templateBtn{
    padding:8px 12px;
    border:0;
    border-radius:8px;
    background:#1e3a8a;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.templateBtn:hover{
    opacity:.9;
}

.resultArea{
    line-height:1.8;
    color:#374151;
}

.resultSuccess{
    color:#15803d;
    font-weight:bold;
}

.resultError{
    color:#b91c1c;
    font-weight:bold;
}

.resultWarn{
    color:#9a3412;
    font-weight:bold;
}

.toolbar{
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.toolbar input{
    width:280px;
    padding:10px 12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:14px;
}

.toolbar button{
    padding:10px 14px;
    border:0;
    border-radius:8px;
    background:#1e3a8a;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.toolbar button:hover{
    opacity:.9;
}

.levelFilters,
.fieldFilters{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin:0 0 20px 0;
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:14px 18px;
}

.levelFilters label,
.fieldFilters label{
    font-size:14px;
    color:#374151;
    cursor:pointer;
}

.levelFilters input,
.fieldFilters input{
    margin-right:5px;
}

.zoomControl{
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:12px 16px;
    margin:0 0 20px 0;
    width:fit-content;
}

.zoomControl input{
    width:200px;
}

.chartBox{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    overflow:auto;
}

.zoomWrap{
    transform-origin:top left;
}

.tree{
    list-style:none;
    padding-left:0;
    margin:0;
}

.tree ul{
    list-style:none;
    margin:8px 0 0 30px;
    padding-left:18px;
    border-left:1px dashed #cbd5e1;
}

.tree li{
    margin:10px 0;
    position:relative;
}

.node{
    display:inline-block;
    min-width:320px;
    max-width:520px;
    background:#ffffff;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:12px 14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
}

.node:hover{
    border-color:#1e3a8a;
}

.nodeHeader{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
}

.toggle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#1e3a8a;
    color:#fff;
    font-size:14px;
    line-height:22px;
    text-align:center;
    flex-shrink:0;
}

.emptyToggle{
    width:22px;
    height:22px;
    flex-shrink:0;
}

.deptName{
    font-weight:bold;
    font-size:16px;
    color:#111827;
}

.nodeInfo{
    font-size:13px;
    color:#374151;
    line-height:1.6;
    padding-left:30px;
}

.totalPeople{
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed #cbd5e1;
    font-weight:bold;
    color:#1e3a8a;
}

.hidden{
    display:none;
}

.match{
    border:2px solid #dc2626;
    background:#fff1f2;
}

.pathOnly{
    opacity:.45;
}

.summary{
    margin-bottom:15px;
    color:#374151;
    font-size:14px;
}

@media(max-width:900px){
    .topGrid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<h1>組織圖測試版</h1>

<div class="desc">
上傳 Excel 後，系統會依「上級部門」建立樹狀組織圖，並可展開 / 收合。
</div>

<div class="topGrid">
    <div class="uploadBox">
        <div class="uploadActions">
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <button class="templateBtn" onclick="downloadTemplate()">下載上傳模板</button>
        </div>
    </div>

    <div id="uploadResult" class="resultArea">
        <b>上傳結果</b><br>
        尚未上傳 Excel
    </div>
</div>

<div id="levelFilters" class="levelFilters"></div>
<div id="fieldFilters" class="fieldFilters"></div>

<div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜尋部門、主管、部門代碼">
    <button onclick="expandAll()">全部展開</button>
    <button onclick="collapseAll()">全部收合</button>
</div>

<div class="zoomControl">
    <b>縮放：</b>
    <input type="range" id="zoomRange" min="50" max="150" value="100">
    <span id="zoomValue">100%</span>
</div>

<div class="chartBox">
    <div id="zoomWrap" class="zoomWrap">
        <div id="summary" class="summary"></div>
        <ul id="tree" class="tree"></ul>
    </div>
</div>

<script>
const requiredColumns = [
    "公司代碼",
    "層級",
    "上級部門",
    "部門代碼",
    "費用代碼",
    "部門全名",
    "主管一姓名",
    "主管一職稱",
    "在職人數"
];

let allNodes = [];
let rootNodes = [];
let selectedLevels = new Set();

let visibleFields = new Set([
    "level",
    "deptCode",
    "costCode",
    "manager"
]);

document.getElementById("excelFile").addEventListener("change", handleFile);
document.getElementById("searchInput").addEventListener("input", searchTree);

document.getElementById("zoomRange").addEventListener("input", function(){
    const value = this.value;
    document.getElementById("zoomValue").innerText = value + "%";
    document.getElementById("zoomWrap").style.transform = `scale(${value / 100})`;
});

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(firstSheet, {defval:""});

        const isValid = checkColumns(rows);

        if(!isValid){
            clearPageData();
            return;
        }

        buildTreeData(rows);
        renderLevelFilters();
        renderFieldFilters();
        renderTree();
    };

    reader.readAsArrayBuffer(file);
}

function clearPageData(){
    allNodes = [];
    rootNodes = [];
    selectedLevels.clear();

    document.getElementById("levelFilters").innerHTML = "";
    document.getElementById("fieldFilters").innerHTML = "";
    document.getElementById("summary").innerText = "";
    document.getElementById("tree").innerHTML = "";
}

function checkColumns(rows){
    const result = document.getElementById("uploadResult");

    if(rows.length === 0){
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultError">Excel 沒有資料</span>
        `;
        return false;
    }

    const columns = Object.keys(rows[0]);
    const missing = requiredColumns.filter(col => !columns.includes(col));

    if(missing.length > 0){
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultError">缺少欄位：${missing.join("、")}</span>
        `;
        return false;
    }

    result.innerHTML = `
        <b>上傳結果</b><br>
        <span class="resultSuccess">Excel 讀取成功</span><br>
        資料檢查中...
    `;

    return true;
}

function buildTreeData(rows){
    const result = document.getElementById("uploadResult");

    selectedLevels.clear();

    const deptMap = {};
    const errors = [];

    allNodes = [];
    rootNodes = [];

    rows.forEach((row, index) => {
        const deptCode = String(row["部門代碼"]).trim();

        if(!deptCode) return;

        if(deptMap[deptCode]){
            errors.push("部門代碼重複：" + deptCode);
        }

        const levelText = String(row["層級"]).trim() || "未設定";

        const node = {
            row: row,
            deptCode: deptCode,
            parentCode: String(row["上級部門"]).trim(),
            levelText: levelText,
            level: Number(levelText) || 999,
            order: index,
            ownPeople: parsePeople(row["在職人數"]),
            totalPeople: 0,
            children: [],
            expanded: true
        };

        deptMap[deptCode] = node;
        allNodes.push(node);
    });

    allNodes.forEach(node => {
        if(node.parentCode && deptMap[node.parentCode]){
            deptMap[node.parentCode].children.push(node);
        }else{
            rootNodes.push(node);

            if(node.parentCode && node.parentCode !== "HH" && !deptMap[node.parentCode]){
                errors.push("找不到上級部門：" + node.parentCode + "，部門：" + node.deptCode);
            }
        }
    });

    sortNodes(rootNodes);
    rootNodes.forEach(node => calculateTotalPeople(node));

    if(errors.length > 0){
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultSuccess">Excel 讀取成功</span><br>
            <span class="resultWarn">資料提醒：</span><br>
            ${errors.join("<br>")}
        `;
    }else{
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultSuccess">Excel 讀取成功</span><br>
            資料檢查結果：目前無資料異常
        `;
    }

    document.getElementById("summary").innerText =
        "共讀取 " + allNodes.length + " 個部門，最上層部門 " + rootNodes.length + " 個。";
}

function sortNodes(nodes){
    nodes.sort((a,b) => {
        if(a.level !== b.level) return a.level - b.level;
        return a.order - b.order;
    });

    nodes.forEach(node => sortNodes(node.children));
}

function parsePeople(value){
    const num = Number(String(value).replace(/,/g, "").trim());
    return isNaN(num) ? 0 : num;
}

function calculateTotalPeople(node){
    let total = node.ownPeople;

    node.children.forEach(child => {
        total += calculateTotalPeople(child);
    });

    node.totalPeople = total;
    return total;
}

function renderLevelFilters(){
    const box = document.getElementById("levelFilters");
    box.innerHTML = "";

    const levels = [...new Set(allNodes.map(node => node.levelText))]
        .sort((a,b) => {
            const na = Number(a);
            const nb = Number(b);

            if(isNaN(na)) return 1;
            if(isNaN(nb)) return -1;

            return na - nb;
        });

    const title = document.createElement("div");
    title.innerHTML = "<b>層級篩選：</b>";
    box.appendChild(title);

    levels.forEach(level => {
        const label = document.createElement("label");

        label.innerHTML = `
            <input type="checkbox" value="${level}">
            層級 ${level}
        `;

        const checkbox = label.querySelector("input");

        checkbox.addEventListener("change", function(){
            if(this.checked){
                selectedLevels.add(this.value);
            }else{
                selectedLevels.delete(this.value);
            }

            expandAll();
            renderTree();
        });

        box.appendChild(label);
    });
}

function renderFieldFilters(){
    const box = document.getElementById("fieldFilters");
    box.innerHTML = "";

    const title = document.createElement("div");
    title.innerHTML = "<b>顯示資訊：</b>";
    box.appendChild(title);

    const fields = [
        { key:"manager", label:"主管" },
        { key:"level", label:"部門層級" },
        { key:"deptCode", label:"部門代碼" },
        { key:"costCode", label:"費用代碼" }
    ];

    fields.forEach(field => {
        const label = document.createElement("label");

        label.innerHTML = `
            <input type="checkbox" value="${field.key}" checked>
            ${field.label}
        `;

        const checkbox = label.querySelector("input");

        checkbox.addEventListener("change", function(){
            if(this.checked){
                visibleFields.add(this.value);
            }else{
                visibleFields.delete(this.value);
            }

            renderTree();
        });

        box.appendChild(label);
    });
}

function renderTree(){
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    rootNodes.forEach(node => {
        if(shouldShowNode(node)){
            tree.appendChild(createNodeElement(node));
        }
    });
}

function shouldShowNode(node){
    if(selectedLevels.size === 0){
        return true;
    }

    if(selectedLevels.has(node.levelText)){
        return true;
    }

    return node.children.some(child => shouldShowNode(child));
}

function isPathOnly(node){
    if(selectedLevels.size === 0){
        return false;
    }

    return !selectedLevels.has(node.levelText);
}

function renderNodeInfo(node){
    const row = node.row;
    const lines = [];

    if(visibleFields.has("manager")){
        lines.push(`主管：${row["主管一姓名"] || "-"} / ${row["主管一職稱"] || "-"}`);
    }

    if(visibleFields.has("level")){
        lines.push(`層級：${row["層級"] || "-"}`);
    }

    if(visibleFields.has("deptCode")){
        lines.push(`部門代碼：${row["部門代碼"] || "-"}`);
    }

    if(visibleFields.has("costCode")){
        lines.push(`費用代碼：${row["費用代碼"] || "-"}`);
    }

    lines.push(`
        <div class="totalPeople">
            本單位人數：${node.ownPeople} 人<br>
            含轄下合計：${node.totalPeople} 人
        </div>
    `);

    return lines.join("<br>");
}

function createNodeElement(node){
    const li = document.createElement("li");
    const hasChildren = node.children.length > 0;

    const nodeDiv = document.createElement("div");
    nodeDiv.className = "node";

    if(isPathOnly(node)){
        nodeDiv.classList.add("pathOnly");
    }

    nodeDiv.dataset.search = [
        node.row["部門全名"],
        node.row["主管一姓名"],
        node.row["主管一職稱"],
        node.row["部門代碼"],
        node.row["費用代碼"]
    ].join(" ").toLowerCase();

    nodeDiv.innerHTML = `
        <div class="nodeHeader">
            ${
                hasChildren
                ? `<span class="toggle">${node.expanded ? "－" : "＋"}</span>`
                : `<span class="emptyToggle"></span>`
            }
            <span class="deptName">${node.row["部門全名"] || "-"}</span>
        </div>
        <div class="nodeInfo">
            ${renderNodeInfo(node)}
        </div>
    `;

    if(hasChildren){
        nodeDiv.addEventListener("click", function(e){
            e.stopPropagation();
            node.expanded = !node.expanded;
            renderTree();
        });
    }

    li.appendChild(nodeDiv);

    if(hasChildren){
        const ul = document.createElement("ul");

        if(!node.expanded){
            ul.className = "hidden";
        }

        node.children.forEach(child => {
            if(shouldShowNode(child)){
                ul.appendChild(createNodeElement(child));
            }
        });

        li.appendChild(ul);
    }

    return li;
}

function expandAll(){
    allNodes.forEach(node => node.expanded = true);
    renderTree();
}

function collapseAll(){
    allNodes.forEach(node => node.expanded = false);
    renderTree();
}

function searchTree(){
    const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

    if(keyword){
        expandAll();
    }

    setTimeout(() => {
        document.querySelectorAll(".node").forEach(node => {
            node.classList.remove("match");

            if(keyword && node.dataset.search.includes(keyword)){
                node.classList.add("match");
            }
        });
    }, 0);
}

function downloadTemplate(){
    const templateData = [
        {
            "公司代碼":"HH",
            "層級":1,
            "上級部門":"HH",
            "部門代碼":"DA60",
            "費用代碼":"DA611700H7",
            "部門全名":"中央人資",
            "主管一姓名":"夏國安",
            "主管一職稱":"人資長",
            "在職人數":1
        },
        {
            "公司代碼":"HH",
            "層級":2,
            "上級部門":"DA60",
            "部門代碼":"DA610100H7",
            "費用代碼":"DA610100H7",
            "部門全名":"人資營運效能處",
            "主管一姓名":"王小明",
            "主管一職稱":"處長",
            "在職人數":3
        },
        {
            "公司代碼":"HH",
            "層級":3,
            "上級部門":"DA610100H7",
            "部門代碼":"DA610101H7",
            "費用代碼":"DA610101H7",
            "部門全名":"人資服務部",
            "主管一姓名":"陳小華",
            "主管一職稱":"部長",
            "在職人數":8
        }
    ];

    const worksheet = XLSX.utils.json_to_sheet(templateData);
    const workbook = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(workbook, worksheet, "組織圖上傳模板");
    XLSX.writeFile(workbook, "組織圖上傳模板.xlsx");
}
</script>

</body>
</html>
