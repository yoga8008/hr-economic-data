<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>組織圖測試版</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
    color:#111827;
}

h1{
    margin-bottom:10px;
}

.desc{
    color:#666;
    margin-bottom:20px;
}

.uploadBox{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

#message{
    margin:15px 0;
    color:#15803d;
    font-weight:bold;
}

.errorBox{
    background:#fff7ed;
    border:1px solid #fdba74;
    border-radius:10px;
    padding:12px;
    margin:15px 0;
    color:#9a3412;
    font-size:14px;
    line-height:1.7;
}

.toolbar{
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.toolbar input{
    width:280px;
    padding:10px 12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:14px;
}

.toolbar button{
    padding:10px 14px;
    border:0;
    border-radius:8px;
    background:#1e3a8a;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.toolbar button:hover{
    opacity:.9;
}

.chartBox{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    overflow:auto;
}

.tree{
    list-style:none;
    padding-left:0;
    margin:0;
}

.tree ul{
    list-style:none;
    margin:8px 0 0 30px;
    padding-left:18px;
    border-left:1px dashed #cbd5e1;
}

.tree li{
    margin:10px 0;
    position:relative;
}

.node{
    display:inline-block;
    min-width:320px;
    max-width:520px;
    background:#ffffff;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:12px 14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
}

.node:hover{
    border-color:#1e3a8a;
}

.nodeHeader{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
}

.toggle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#1e3a8a;
    color:#fff;
    font-size:14px;
    line-height:22px;
    text-align:center;
    flex-shrink:0;
}

.emptyToggle{
    width:22px;
    height:22px;
    flex-shrink:0;
}

.deptName{
    font-weight:bold;
    font-size:16px;
    color:#111827;
}

.nodeInfo{
    font-size:13px;
    color:#374151;
    line-height:1.6;
    padding-left:30px;
}

.hidden{
    display:none;
}

.match{
    border:2px solid #dc2626;
    background:#fff1f2;
}

.summary{
    margin-bottom:15px;
    color:#374151;
    font-size:14px;
}
</style>
</head>

<body>

<h1>組織圖測試版</h1>

<div class="desc">
上傳 Excel 後，系統會依「上級部門」建立樹狀組織圖，並可展開 / 收合。
</div>

<div class="uploadBox">
    <input type="file" id="excelFile" accept=".xlsx,.xls">
    <div id="message"></div>
</div>

<div id="errorList"></div>

<div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜尋部門、主管、部門代碼">
    <button onclick="expandAll()">全部展開</button>
    <button onclick="collapseAll()">全部收合</button>
</div>

<div class="chartBox">
    <div id="summary" class="summary"></div>
    <ul id="tree" class="tree"></ul>
</div>

<script>
const requiredColumns = [
    "公司代碼",
    "層級",
    "上級部門",
    "部門代碼",
    "費用代碼",
    "部門全名",
    "主管一姓名",
    "主管一職稱",
    "在職人數"
];

let allNodes = [];
let rootNodes = [];

document.getElementById("excelFile").addEventListener("change", handleFile);
document.getElementById("searchInput").addEventListener("input", searchTree);

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:"array"});
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(firstSheet, {defval:""});

        checkColumns(rows);
        buildTreeData(rows);
        renderTree();
    };

    reader.readAsArrayBuffer(file);
}

function checkColumns(rows){
    const message = document.getElementById("message");

    if(rows.length === 0){
        message.innerText = "Excel 沒有資料";
        message.style.color = "#b91c1c";
        return;
    }

    const columns = Object.keys(rows[0]);
    const missing = requiredColumns.filter(col => !columns.includes(col));

    if(missing.length > 0){
        message.innerText = "缺少欄位：" + missing.join("、");
        message.style.color = "#b91c1c";
    }else{
        message.innerText = "Excel 讀取成功";
        message.style.color = "#15803d";
    }
}

function buildTreeData(rows){
    const errorList = document.getElementById("errorList");
    errorList.innerHTML = "";

    const deptMap = {};
    const errors = [];

    allNodes = [];
    rootNodes = [];

    rows.forEach((row, index) => {
        const deptCode = String(row["部門代碼"]).trim();

        if(!deptCode) return;

        if(deptMap[deptCode]){
            errors.push("部門代碼重複：" + deptCode);
        }

        const node = {
            row: row,
            deptCode: deptCode,
            parentCode: String(row["上級部門"]).trim(),
            level: Number(row["層級"]) || 999,
            order: index,
            children: [],
            expanded: true
        };

        deptMap[deptCode] = node;
        allNodes.push(node);
    });

    allNodes.forEach(node => {
        if(node.parentCode && deptMap[node.parentCode]){
            deptMap[node.parentCode].children.push(node);
        }else{
            rootNodes.push(node);

            if(node.parentCode && !deptMap[node.parentCode]){
                errors.push("找不到上級部門：" + node.parentCode + "，部門：" + node.deptCode);
            }
        }
    });

    sortNodes(rootNodes);

    if(errors.length > 0){
        errorList.innerHTML = `
            <div class="errorBox">
                <b>資料提醒：</b><br>
                ${errors.join("<br>")}
            </div>
        `;
    }

    document.getElementById("summary").innerText =
        "共讀取 " + allNodes.length + " 個部門，最上層部門 " + rootNodes.length + " 個。";
}

function sortNodes(nodes){
    nodes.sort((a,b) => {
        if(a.level !== b.level) return a.level - b.level;
        return a.order - b.order;
    });

    nodes.forEach(node => sortNodes(node.children));
}

function renderTree(){
    const tree = document.getElementById("tree");
    tree.innerHTML = "";

    rootNodes.forEach(node => {
        tree.appendChild(createNodeElement(node));
    });
}

function createNodeElement(node){
    const li = document.createElement("li");

    const hasChildren = node.children.length > 0;

    const nodeDiv = document.createElement("div");
    nodeDiv.className = "node";
    nodeDiv.dataset.search = [
        node.row["部門全名"],
        node.row["主管一姓名"],
        node.row["主管一職稱"],
        node.row["部門代碼"],
        node.row["費用代碼"]
    ].join(" ").toLowerCase();

    nodeDiv.innerHTML = `
        <div class="nodeHeader">
            ${
                hasChildren
                ? `<span class="toggle">${node.expanded ? "－" : "＋"}</span>`
                : `<span class="emptyToggle"></span>`
            }
            <span class="deptName">${node.row["部門全名"] || "-"}</span>
        </div>
        <div class="nodeInfo">
            層級：${node.row["層級"] || "-"}<br>
            部門代碼：${node.row["部門代碼"] || "-"}<br>
            費用代碼：${node.row["費用代碼"] || "-"}<br>
            主管：${node.row["主管一姓名"] || "-"} / ${node.row["主管一職稱"] || "-"}<br>
            在職人數：${node.row["在職人數"] || 0} 人
        </div>
    `;

    if(hasChildren){
        nodeDiv.addEventListener("click", function(e){
            e.stopPropagation();
            node.expanded = !node.expanded;
            renderTree();
        });
    }

    li.appendChild(nodeDiv);

    if(hasChildren){
        const ul = document.createElement("ul");

        if(!node.expanded){
            ul.className = "hidden";
        }

        node.children.forEach(child => {
            ul.appendChild(createNodeElement(child));
        });

        li.appendChild(ul);
    }

    return li;
}

function expandAll(){
    allNodes.forEach(node => node.expanded = true);
    renderTree();
}

function collapseAll(){
    allNodes.forEach(node => node.expanded = false);
    renderTree();
}

function searchTree(){
    const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

    document.querySelectorAll(".node").forEach(node => {
        node.classList.remove("match");

        if(keyword && node.dataset.search.includes(keyword)){
            node.classList.add("match");
        }
    });

    if(keyword){
        expandAll();

        setTimeout(() => {
            document.querySelectorAll(".node").forEach(node => {
                if(node.dataset.search.includes(keyword)){
                    node.classList.add("match");
                }
            });
        }, 0);
    }
}
</script>

</body>
</html>
