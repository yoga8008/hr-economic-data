<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>組織圖測試版</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
    color:#111827;
}

h1{ margin-bottom:10px; }

.desc{
    color:#666;
    margin-bottom:20px;
}

.topPanelHeader{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

.toggleTopBtn{
    height:34px;
    padding:0 14px;
    border:0;
    border-radius:8px;
    background:#374151;
    color:#fff;
    font-weight:bold;
    font-size:12px;
    cursor:pointer;
}

.topPanel{ display:block; }
.topPanel.collapsed{ display:none; }

.topGrid{
    display:flex;
    gap:20px;
    align-items:stretch;
    margin-bottom:20px;
}

.topGrid > .uploadBox,
.topGrid > .resultArea{
    flex:0 0 calc(50% - 10px);
    width:calc(50% - 10px);
}

.uploadBox,
.resultArea{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    min-height:120px;
    box-sizing:border-box;
}

.uploadBox{
    max-height:260px;
    overflow:auto;
}

.resultArea{
    line-height:1.8;
    color:#374151;
    max-height:260px;
    overflow:auto;
}

.uploadActions{
    display:flex;
    gap:16px;
    align-items:flex-start;
    flex-wrap:wrap;
}

.uploadMain{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.uploadButtons{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
}

.uploadHelp{
    color:#6b7280;
    font-size:13px;
    line-height:1.7;
    padding-top:4px;
    min-width:280px;
}

.memoryInfo{
    margin-top:10px;
    color:#374151;
    font-size:13px;
    line-height:1.7;
}

.templateBtn,
.exportBtn,
.clearMemoryBtn,
.chartLeftActions button,
.modeBtn{
    height:36px;
    padding:0 12px;
    border:0;
    border-radius:8px;
    background:#1e3a8a;
    color:#fff;
    font-weight:bold;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
    box-sizing:border-box;
    line-height:36px;
}

.templateBtn:hover,
.exportBtn:hover,
.clearMemoryBtn:hover,
.chartLeftActions button:hover,
.modeBtn:hover{
    opacity:.9;
}

.modeBtn.inactive{
    background:#e5e7eb;
    color:#374151;
}

.clearMemoryBtn{ background:#991b1b; }

.sortSelect,
.depthSelect,
pdfModeSelect,
.pdfModeSelect{
    height:36px;
    padding:0 10px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:13px;
    background:#fff;
    color:#374151;
    box-sizing:border-box;
}

.resultSuccess{
    color:#15803d;
    font-weight:bold;
}

.resultError{
    color:#b91c1c;
    font-weight:bold;
}

.resultWarn{
    color:#9a3412;
    font-weight:bold;
}

.filterBar{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:nowrap;
}

.filterBar .sortSelect{
    flex:0 0 220px;
    width:220px;
}

.filterBar .dropdownFilter{
    flex:0 0 280px;
    width:280px;
    min-width:280px;
}

.dropdownFilter{
    position:relative;
    min-width:220px;
}

.dropdownBtn{
    width:100%;
    height:38px;
    padding:0 12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    background:#fff;
    color:#374151;
    font-size:13px;
    text-align:left;
    cursor:pointer;
    box-sizing:border-box;
}

.dropdownBtn::after{
    content:"▼";
    float:right;
    font-size:10px;
    color:#6b7280;
    margin-top:2px;
}

.dropdownMenu{
    display:none;
    position:absolute;
    top:44px;
    left:0;
    width:100%;
    max-height:260px;
    overflow:auto;
    background:#fff;
    border:1px solid #cbd5e1;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    z-index:50;
    padding:8px;
    box-sizing:border-box;
}

.dropdownFilter.open .dropdownMenu{ display:block; }

.dropdownMenu label{
    display:block;
    padding:7px 8px;
    font-size:13px;
    color:#374151;
    cursor:pointer;
    border-radius:6px;
}

.dropdownMenu label:hover{ background:#f3f4f6; }
.dropdownMenu input{ margin-right:6px; }

.selectAllLabel{
    font-weight:bold;
    border-bottom:1px solid #e5e7eb;
    margin-bottom:4px;
}

.chartBox{
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    padding:20px;
    overflow:auto;
}

.chartHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:nowrap;
}

.chartLeftActions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    flex:1;
    min-width:0;
}

.chartLeftActions input[type="text"]{
    width:350px;
    height:36px;
    padding:0 12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:13px;
    box-sizing:border-box;
}

.focusOption{
    display:flex;
    align-items:center;
    gap:6px;
    height:36px;
    padding:0 12px;
    background:#fff;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:12px;
    color:#374151;
    cursor:pointer;
    white-space:nowrap;
    box-sizing:border-box;
}

.focusOption input{
    width:15px;
    height:15px;
    margin:0;
}

.chartActions{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    flex-shrink:0;
}

.viewModeControl,
.zoomControl{
    display:flex;
    align-items:center;
    gap:8px;
    min-height:36px;
    padding:6px 12px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:12px;
    white-space:nowrap;
    box-sizing:border-box;
}

.viewModeControl b,
.zoomControl b{ font-size:12px; }

.zoomControl input{
    width:110px;
    height:auto;
}

.zoomWrap{ transform-origin:top left; }

.summary{
    color:#374151;
    font-size:14px;
    margin-bottom:15px;
}

.tree{
    list-style:none;
    padding-left:0;
    margin:0;
}

.tree ul{
    list-style:none;
    margin:8px 0 0 30px;
    padding-left:18px;
    border-left:1px dashed #cbd5e1;
}

.tree li{
    margin:10px 0;
    position:relative;
}

.node{
    display:inline-block;
    min-width:320px;
    max-width:520px;
    background:#ffffff;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:12px 14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    cursor:pointer;
}

.node:hover{ border-color:#1e3a8a; }

.nodeHeader{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
}

.toggle{
    width:22px;
    height:22px;
    border-radius:50%;
    background:#1e3a8a;
    color:#fff;
    font-size:14px;
    line-height:22px;
    text-align:center;
    flex-shrink:0;
}

.emptyToggle{
    width:22px;
    height:22px;
    flex-shrink:0;
}

.deptName{
    font-weight:bold;
    font-size:16px;
    color:#111827;
}

.nodeInfo{
    font-size:12px;
    color:#374151;
    line-height:1.55;
    padding-left:24px;
}

.totalPeople{
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed #cbd5e1;
    font-weight:bold;
    color:#1e3a8a;
}

/* ===============================
   樹狀清單：長條資訊列
   只影響樹狀清單，不影響組織圖
================================ */
.tree .node{
    display:block;
    width:100%;
    min-width:1100px;
    max-width:none;
    padding:9px 12px;
    border-radius:8px;
    box-shadow:none;
    background:#ffffff;
    box-sizing:border-box;
}

.tree .nodeHeader{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:0;
    vertical-align:middle;
}

.tree .deptName{
    font-size:15px;
    font-weight:bold;
    color:#111827;
}

.tree .nodeInfo{
    display:inline;
    padding-left:8px;
    font-size:13px;
    color:#374151;
    line-height:1.6;
}

.tree .totalPeople{
    display:inline;
    margin-top:0;
    padding-top:0;
    border-top:0;
    color:#1e3a8a;
    font-weight:bold;
}

.tree ul{
    margin:6px 0 0 28px;
    padding-left:18px;
    border-left:1px dashed #cbd5e1;
}

.tree li{
    margin:6px 0;
}

.peopleLink{
    color:#1e3a8a;
    font-weight:bold;
    text-decoration:underline;
    cursor:pointer;
}

.hidden{ display:none !important; }

.match{
    border:2px solid #dc2626 !important;
    background:#fff1f2 !important;
}

.pathOnly{ opacity:.45; }

.orgChart{
    display:flex;
    justify-content:center;
    padding:30px 20px 60px;
    min-width:max-content;
    overflow:visible;
}

.orgNodeGroup{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    flex-shrink:0;
    margin-bottom:24px;
}

.orgNode{
    width:260px;
    background:#fff;
    border:1px solid #cbd5e1;
    border-radius:12px;
    padding:10px 12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    text-align:left;
    position:relative;
    box-sizing:border-box;
    z-index:2;
    cursor:pointer;
}

.orgNode:hover{ border-color:#1e3a8a; }

.orgNode .deptName{
    display:block;
    text-align:center;
    margin-bottom:6px;
    font-size:15px;
}

.orgChildren{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:36px 32px;
    margin-top:42px;
    position:relative;
    padding-top:0;
    flex-wrap:wrap;
    max-width:3000px;
}

.orgNodeGroup.hasChildren > .orgNode::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-22px;
    width:1px;
    height:22px;
    background:#94a3b8;
    transform:translateX(-50%);
}

.orgChildren > .orgNodeGroup::before{
    content:"";
    position:absolute;
    top:-21px;
    left:50%;
    width:1px;
    height:21px;
    background:#94a3b8;
    transform:translateX(-50%);
}

.orgConnectorLine{
    position:absolute;
    top:-21px;
    height:1px;
    background:#94a3b8;
    pointer-events:none;
    z-index:1;
}

.personPanel{
    background:#fff;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:14px;
    overflow:auto;
}

.personTable{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

.personTable th{
    background:#f3f4f6;
    color:#374151;
    text-align:left;
    padding:10px;
    border-bottom:1px solid #d1d5db;
    white-space:nowrap;
}

.personTable td{
    padding:10px;
    border-bottom:1px solid #e5e7eb;
    color:#374151;
    white-space:nowrap;
}

.personTable tr:hover{ background:#f9fafb; }

.noPerson{
    color:#6b7280;
    line-height:1.8;
}

.pdfExportWrapper{
    background:#ffffff;
    padding:20px 20px 30px;
    box-sizing:border-box;
    width:max-content;
}

.pdfExportHeader{
    position:relative;
    width:100%;
    min-height:40px;
    margin-bottom:18px;
}

.pdfExportTitle{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#111827;
    line-height:40px;
}

.pdfExportDate{
    position:absolute;
    right:0;
    top:11px;
    text-align:right;
    font-size:13px;
    color:#374151;
    white-space:nowrap;
}

@media(max-width:1300px){
    .chartHeader{
        align-items:flex-start;
        flex-direction:column;
        flex-wrap:wrap;
    }

    .chartLeftActions,
    .chartActions{
        flex-wrap:wrap;
    }

    .topGrid{
        flex-direction:column;
    }

    .topGrid > .uploadBox,
    .topGrid > .resultArea{
        flex:0 0 100%;
        width:100%;
    }
}
</style>
</head>

<body>

<h1>組織圖測試版</h1>

<div class="desc">
上傳 Excel 後，系統會依「部門資訊」建立組織圖，並依「人員資訊」顯示部門人員。
</div>

<div class="topPanelHeader">
    <button id="toggleTopPanelBtn" class="toggleTopBtn" onclick="toggleTopPanel()">
        收合上方設定 ▲
    </button>
</div>

<div id="topPanel" class="topPanel">
    <div class="topGrid">
        <div class="uploadBox">
            <div class="uploadActions">
                <div class="uploadMain">
                    <input type="file" id="excelFile" accept=".xlsx,.xls">
                    <div id="memoryInfo" class="memoryInfo"></div>
                    <div class="uploadButtons">
                        <button class="templateBtn" onclick="downloadTemplate()">下載上傳模板</button>
                        <button class="clearMemoryBtn" onclick="clearSavedDataWithPassword()">清除記憶資料</button>
                    </div>
                </div>

                <div class="uploadHelp">
                    Excel 請使用一個檔案，內含兩個分頁：<br>
                    1. 部門資訊<br>
                    2. 人員資訊
                </div>
            </div>
        </div>

        <div id="uploadResult" class="resultArea">
            <b>上傳結果</b><br>
            尚未上傳 Excel
        </div>
    </div>


</div>

<div class="filterBar">
    <select id="sortMode" class="sortSelect" onchange="applySortAndRender()">
        <option value="default">原始順序</option>
        <option value="name">依名稱排序</option>
        <option value="code">依部門代碼排序</option>
    </select>

    <div id="levelFilters" class="dropdownFilter"></div>
    <div id="fieldFilters" class="dropdownFilter"></div>
    <div id="legalFilters" class="dropdownFilter"></div>
</div>

<div class="chartBox">
    <div class="chartHeader">
        <div class="chartLeftActions">

            <input type="text" id="searchInput" placeholder="搜尋部門、主管、部門代碼">

            <label class="focusOption">
                <input type="checkbox" id="focusCheckbox">
                搜尋結果及轄下
            </label>

            <label class="focusOption">
                <input type="checkbox" id="hideZeroTotalCheckbox" onchange="toggleHideZeroTotal(this.checked)">
                隱藏含轄下合計：0 人
            </label>

            <button onclick="searchAndJump()">搜尋</button>
            <button onclick="expandAll()">全部展開</button>
            <button onclick="collapseAll()">全部收合</button>
        </div>

        <div class="chartActions">
            <div class="viewModeControl">
                <b>呈現方式：</b>
                <button id="treeModeBtn" class="modeBtn" onclick="setViewMode('tree')">樹狀清單</button>
                <button id="orgModeBtn" class="modeBtn inactive" onclick="setViewMode('org')">組織圖</button>
            </div>

            <div class="zoomControl">
                <b>縮放：</b>
                <input type="range" id="zoomRange" min="50" max="150" value="100">
                <span id="zoomValue">100%</span>
            </div>

            <select id="pdfExportMode" class="pdfModeSelect">
                <option value="current">匯出模式：目前畫面</option>
                <option value="fitOnePage">匯出模式：自動縮放一頁</option>
                <option value="splitByFirstLevel">匯出模式：依第一層子部門分頁</option>
            </select>

            <button class="exportBtn" onclick="exportPDF()">匯出 PDF</button>
        </div>
    </div>

    <div id="summary" class="summary"></div>

    <div id="zoomWrap" class="zoomWrap">
        <ul id="tree" class="tree"></ul>
        <div id="orgChart" class="orgChart hidden"></div>
    </div>
</div>

<div class="chartBox" style="margin-top:20px;">
    <div class="chartHeader">
        <div class="chartLeftActions">
            <b>人員資訊</b>
        </div>
    </div>

    <div id="personSummary" class="summary">
        請點選部門人數查看人員資訊
    </div>

    <div id="personPanel" class="personPanel">
        尚未選擇部門
    </div>
</div>

<script>
const requiredColumns = [
    "公司代碼","層級","上級部門","部門代碼","費用代碼",
    "部門全名","主管一姓名","主管一職稱","在職人數"
];

const requiredPersonColumns = [
    "所屬法人","部門代碼","部門名稱","員工工號","員工姓名","職稱名稱","資位"
];

const STORAGE_KEY_ROWS = "orgChartSavedRows";
const STORAGE_KEY_PERSON_ROWS = "orgChartSavedPersonRows";
const STORAGE_KEY_FILE = "orgChartFileName";
const STORAGE_KEY_UPDATED_AT = "orgChartUpdatedAt";
const ADMIN_PASSWORD = "1234";

let allNodes = [];
let rootNodes = [];
let selectedLevels = new Set();
let selectedLegals = new Set();
let currentViewMode = "tree";
let focusNodes = [];
let maxDisplayDepth = "all";
let hideZeroTotal = false;

let personRows = [];
let personMapByDept = {};
let currentSelectedDeptCode = "";
let currentSelectedPersonType = "own";

let filteredPersonRows = [];
let ownPeopleCountCache = {};
let totalPeopleCountCache = new Map();

let visibleFields = new Set(["level","deptCode","costCode","manager"]);

document.addEventListener("DOMContentLoaded", function(){
    loadSavedData();

    document.getElementById("excelFile").addEventListener("change", handleFile);

    document.getElementById("searchInput").addEventListener("input", function(){
        searchTree(false);
    });

    document.getElementById("searchInput").addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            searchAndJump();
        }
    });

    document.getElementById("focusCheckbox").addEventListener("change", function(){
        if(!this.checked){
            focusNodes = [];
            renderChart();
        }
    });

    document.getElementById("zoomRange").addEventListener("input", function(){
        const value = this.value;
        document.getElementById("zoomValue").innerText = value + "%";
        document.getElementById("zoomWrap").style.transform = `scale(${value / 100})`;

        if(currentViewMode === "org"){
            requestAnimationFrame(updateOrgConnectorLines);
        }
    });

    document.addEventListener("click", function(e){
        if(!e.target.closest(".dropdownFilter")){
            closeAllDropdowns();
        }
    });
});

function getNowText(){
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");

    return `${yyyy}/${mm}/${dd} ${hh}:${mi}`;
}

function saveOrgChartMemory(rows, persons, fileName, updatedAt){
    try{
        localStorage.setItem(STORAGE_KEY_ROWS, JSON.stringify(rows));
        localStorage.setItem(STORAGE_KEY_PERSON_ROWS, JSON.stringify(persons || []));
        localStorage.setItem(STORAGE_KEY_FILE, fileName || "未命名檔案");
        localStorage.setItem(STORAGE_KEY_UPDATED_AT, updatedAt || getNowText());
    }catch(err){
        alert("資料已產生，但瀏覽器記憶空間不足，無法儲存本次上傳資料。");
    }
}

function loadSavedData(){
    const savedRows = localStorage.getItem(STORAGE_KEY_ROWS);

    if(!savedRows){
        return;
    }

    try{
        const rows = JSON.parse(savedRows);
        const persons = JSON.parse(localStorage.getItem(STORAGE_KEY_PERSON_ROWS) || "[]");
        const fileName = localStorage.getItem(STORAGE_KEY_FILE) || "未命名檔案";
        const updatedAt = localStorage.getItem(STORAGE_KEY_UPDATED_AT) || "未記錄";

        if(!Array.isArray(rows) || rows.length === 0){
            return;
        }

        personRows = Array.isArray(persons) ? persons : [];
        buildPersonMap();

        buildTreeData(rows);
        renderLevelFilters();
        renderFieldFilters();
        renderLegalFilters();
        renderChart();
        appendMemoryInfo(fileName, updatedAt, false);
    }catch(err){
        localStorage.removeItem(STORAGE_KEY_ROWS);
        localStorage.removeItem(STORAGE_KEY_PERSON_ROWS);
        localStorage.removeItem(STORAGE_KEY_FILE);
        localStorage.removeItem(STORAGE_KEY_UPDATED_AT);

        document.getElementById("uploadResult").innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultError">記憶資料讀取失敗，已清除舊資料</span>
        `;
    }
}

function appendMemoryInfo(fileName, updatedAt, isNewUpload){
    const box = document.getElementById("memoryInfo");
    const status = isNewUpload ? "組織與人員資料已儲存" : "已自動載入上次儲存資料";

    box.innerHTML = `
        <span class="resultSuccess">${status}</span><br>
        最後更新日：${updatedAt}<br>
        來源檔案：${fileName}<br>
        人員資訊：${personRows.length} 筆
    `;
}

function clearSavedDataWithPassword(){
    const input = prompt("請輸入管理密碼，確認後將清除已儲存的組織圖資料：");

    if(input === null) return;

    if(input !== ADMIN_PASSWORD){
        alert("密碼錯誤，無法清除資料。");
        return;
    }

    const confirmClear = confirm("確認要清除所有記憶資料嗎？此動作無法復原。");

    if(!confirmClear) return;

    localStorage.removeItem(STORAGE_KEY_ROWS);
    localStorage.removeItem(STORAGE_KEY_PERSON_ROWS);
    localStorage.removeItem(STORAGE_KEY_FILE);
    localStorage.removeItem(STORAGE_KEY_UPDATED_AT);

    clearPageData();

    document.getElementById("uploadResult").innerHTML = `
        <b>上傳結果</b><br>
        <span class="resultSuccess">已清除記憶資料</span><br>
        尚未上傳 Excel
    `;

    document.getElementById("memoryInfo").innerHTML = "";

    const excelFile = document.getElementById("excelFile");
    if(excelFile) excelFile.value = "";
}

function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:"array"});

        const deptSheetName = workbook.SheetNames.includes("部門資訊")
            ? "部門資訊"
            : workbook.SheetNames[0];

        const personSheetName = workbook.SheetNames.includes("人員資訊")
            ? "人員資訊"
            : "";

        const deptSheet = workbook.Sheets[deptSheetName];
        const rows = XLSX.utils.sheet_to_json(deptSheet, {defval:""});

        let persons = [];

        if(personSheetName){
            const personSheet = workbook.Sheets[personSheetName];
            persons = XLSX.utils.sheet_to_json(personSheet, {defval:""});
        }

        const isValid = checkColumns(rows);

        if(!isValid){
            clearPageData();
            return;
        }

        if(persons.length > 0){
            const isPersonValid = checkPersonColumns(persons);

            if(!isPersonValid){
                clearPageData();
                return;
            }
        }

        const updatedAt = getNowText();

        personRows = persons;
        buildPersonMap();

        saveOrgChartMemory(rows, persons, file.name, updatedAt);

        buildTreeData(rows);
        renderLevelFilters();
        renderFieldFilters();
        renderLegalFilters();
        renderChart();
        appendMemoryInfo(file.name, updatedAt, true);
    };

    reader.readAsArrayBuffer(file);
}

function checkColumns(rows){
    const result = document.getElementById("uploadResult");

    if(rows.length === 0){
        result.innerHTML = `<b>上傳結果</b><br><span class="resultError">部門資訊沒有資料</span>`;
        return false;
    }

    const columns = Object.keys(rows[0]);
    const missing = requiredColumns.filter(col => !columns.includes(col));

    if(missing.length > 0){
        result.innerHTML = `<b>上傳結果</b><br><span class="resultError">部門資訊缺少欄位：${missing.join("、")}</span>`;
        return false;
    }

    result.innerHTML = `<b>上傳結果</b><br><span class="resultSuccess">Excel 讀取成功</span><br>資料檢查中...`;

    return true;
}

function checkPersonColumns(rows){
    const result = document.getElementById("uploadResult");

    if(rows.length === 0) return true;

    const columns = Object.keys(rows[0]);
    const missing = requiredPersonColumns.filter(col => !columns.includes(col));

    if(missing.length > 0){
        result.innerHTML = `<b>上傳結果</b><br><span class="resultError">人員資訊缺少欄位：${missing.join("、")}</span>`;
        return false;
    }

    return true;
}

function buildPersonMap(){
    personMapByDept = {};

    personRows.forEach(person => {
        const deptCode = String(person["部門代碼"] || "").trim();

        if(!deptCode) return;

        if(!personMapByDept[deptCode]){
            personMapByDept[deptCode] = [];
        }

        personMapByDept[deptCode].push(person);
    });
}

function rebuildPeopleCountCache(){
    if(selectedLegals.size === 0){
        filteredPersonRows = [];
    }else{
        filteredPersonRows = personRows.filter(person => {
            const legal = String(person["所屬法人"] || "").trim();
            return selectedLegals.has(legal);
        });
    }

    ownPeopleCountCache = {};
    totalPeopleCountCache = new Map();

    filteredPersonRows.forEach(person => {
        const deptCode = String(person["部門代碼"] || "").trim();
        if(!deptCode) return;

        ownPeopleCountCache[deptCode] = (ownPeopleCountCache[deptCode] || 0) + 1;
    });
}

function buildTreeData(rows){
    const result = document.getElementById("uploadResult");

    selectedLevels.clear();
    selectedLegals.clear();
    focusNodes = [];
    currentSelectedDeptCode = "";
    currentSelectedPersonType = "own";

    const focusCheckbox = document.getElementById("focusCheckbox");
    if(focusCheckbox) focusCheckbox.checked = false;

    const deptMap = {};
    const legalMap = {};
    const errors = [];

    allNodes = [];
    rootNodes = [];

    rows.forEach((row) => {
        const companyCode = String(row["公司代碼"]).trim();

        if(!companyCode) return;

        if(!legalMap[companyCode]){
            const legalNode = {
                row: {
                    "公司代碼": companyCode,
                    "層級": "法人",
                    "上級部門": "",
                    "部門代碼": companyCode,
                    "費用代碼": "",
                    "部門全名": companyCode,
                    "主管一姓名": "",
                    "主管一職稱": "",
                    "在職人數": 0
                },
                deptCode: companyCode,
                parentCode: "",
                levelText: "法人",
                level: 0,
                order: -1,
                ownPeople: 0,
                totalPeople: 0,
                children: [],
                expanded: true,
                isLegalEntity: true,
                isVirtualRoot: false
            };

            legalMap[companyCode] = legalNode;
            deptMap[companyCode] = legalNode;
            allNodes.push(legalNode);
        }
    });

    rows.forEach((row, index) => {
        const deptCode = String(row["部門代碼"]).trim();

        if(!deptCode) return;

        if(deptMap[deptCode]){
            errors.push("部門代碼重複：" + deptCode);
        }

        const levelText = String(row["層級"]).trim() || "未設定";

        const node = {
            row: row,
            deptCode: deptCode,
            parentCode: String(row["上級部門"]).trim(),
            levelText: levelText,
            level: Number(levelText) || 999,
            order: index,
            ownPeople: parsePeople(row["在職人數"]),
            totalPeople: 0,
            children: [],
            expanded: true,
            isLegalEntity: false,
            isVirtualRoot: false
        };

        deptMap[deptCode] = node;
        allNodes.push(node);
    });

    allNodes.forEach(node => {
        if(node.isLegalEntity){
            rootNodes.push(node);
            return;
        }

        if(node.parentCode && deptMap[node.parentCode]){
            deptMap[node.parentCode].children.push(node);
        }else{
            const companyCode = String(node.row["公司代碼"]).trim();

            if(companyCode && legalMap[companyCode]){
                legalMap[companyCode].children.push(node);
            }else{
                rootNodes.push(node);
            }

            if(node.parentCode && !deptMap[node.parentCode]){
                errors.push("找不到上級部門：" + node.parentCode + "，部門：" + node.deptCode);
            }
        }
    });

    sortNodes(rootNodes);
    rootNodes.forEach(node => calculateTotalPeople(node));

    if(errors.length > 0){
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultSuccess">Excel 讀取成功</span><br>
            <span class="resultWarn">異常訊息：</span><br>
            ${errors.join("<br>")}
        `;
    }else{
        result.innerHTML = `
            <b>上傳結果</b><br>
            <span class="resultSuccess">Excel 讀取成功</span><br>
            資料檢查結果：目前無資料異常
        `;
    }

    document.getElementById("summary").innerText =
        "共讀取 " + allNodes.length + " 個節點，最上層節點 " + rootNodes.length + " 個，人員資訊 " + personRows.length + " 筆。";

    document.getElementById("personSummary").innerText = "請點選部門人數查看人員資訊";
    document.getElementById("personPanel").innerHTML = "尚未選擇部門";
}

function sortNodes(nodes){
    const mode = document.getElementById("sortMode")?.value || "default";

    nodes.sort((a,b) => {
        if(mode === "name"){
            return String(a.row["部門全名"] || "")
                .localeCompare(String(b.row["部門全名"] || ""), "zh-Hant");
        }

        if(mode === "code"){
            return String(a.row["部門代碼"] || "")
                .localeCompare(String(b.row["部門代碼"] || ""), "zh-Hant");
        }

        if(a.level !== b.level) return a.level - b.level;
        return a.order - b.order;
    });

    nodes.forEach(node => sortNodes(node.children));
}

function applySortAndRender(){
    sortNodes(rootNodes);
    renderChart();
}

function parsePeople(value){
    const num = Number(String(value).replace(/,/g, "").trim());
    return isNaN(num) ? 0 : num;
}

function calculateTotalPeople(node){
    let total = node.ownPeople;

    node.children.forEach(child => {
        total += calculateTotalPeople(child);
    });

    node.totalPeople = total;
    return total;
}

function closeAllDropdowns(exceptBox){
    document.querySelectorAll(".dropdownFilter").forEach(box => {
        if(box !== exceptBox){
            box.classList.remove("open");
        }
    });
}

function createDropdownCheckbox(boxId, title, items, selectedSet, onChange, defaultText){
    const box = document.getElementById(boxId);
    box.innerHTML = "";

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "dropdownBtn";

    const menu = document.createElement("div");
    menu.className = "dropdownMenu";

    function isAllSelected(){
        return items.length > 0 && selectedSet.size === items.length;
    }

    function updateBtnText(){
        if(isAllSelected()){
            btn.innerText = `${title}：全選`;
        }else if(selectedSet.size === 0){
            btn.innerText = defaultText || title;
        }else{
            btn.innerText = `${title}：${selectedSet.size} 項`;
        }

        const selectAll = menu.querySelector(".selectAllCheckbox");
        if(selectAll){
            selectAll.checked = isAllSelected();
        }
    }

    btn.addEventListener("click", function(e){
        e.stopPropagation();
        const isOpen = box.classList.contains("open");
        closeAllDropdowns(box);
        box.classList.toggle("open", !isOpen);
    });

    const allLabel = document.createElement("label");
    allLabel.className = "selectAllLabel";
    allLabel.innerHTML = `<input type="checkbox" class="selectAllCheckbox">全選`;

    const allCheckbox = allLabel.querySelector("input");

    allCheckbox.addEventListener("change", function(){
        if(this.checked){
            selectedSet.clear();
            items.forEach(item => selectedSet.add(item.value));
        }else{
            selectedSet.clear();
        }

        menu.querySelectorAll("input.itemCheckbox").forEach(cb => {
            cb.checked = selectedSet.has(cb.value);
        });

        updateBtnText();
        onChange();
    });

    menu.appendChild(allLabel);

    items.forEach(item => {
        const label = document.createElement("label");
        label.innerHTML = `
            <input type="checkbox" class="itemCheckbox" value="${item.value}" ${selectedSet.has(item.value) ? "checked" : ""}>
            ${item.label}
        `;

        const checkbox = label.querySelector("input");

        checkbox.addEventListener("change", function(){
            if(this.checked){
                selectedSet.add(this.value);
            }else{
                selectedSet.delete(this.value);
            }

            updateBtnText();
            onChange();
        });

        menu.appendChild(label);
    });

    box.appendChild(btn);
    box.appendChild(menu);

    updateBtnText();
}

function renderLevelFilters(){
    const levels = [...new Set(allNodes.map(node => node.levelText))]
        .sort((a,b) => {
            if(a === "法人") return -1;
            if(b === "法人") return 1;

            const na = Number(a);
            const nb = Number(b);

            if(isNaN(na)) return 1;
            if(isNaN(nb)) return -1;

            return na - nb;
        })
        .map(level => ({
            value: level,
            label: level === "法人" ? "法人" : "層級 " + level
        }));

    selectedLevels.clear();
    levels.forEach(item => selectedLevels.add(item.value));

    createDropdownCheckbox(
        "levelFilters",
        "層級篩選",
        levels,

}

function shouldShowNode(node){
    if(hideZeroTotal && getTotalPeopleByLegal(node) <= 0){
        return false;
    }

    if(node.isVirtualRoot){
        return true;
    }

    if(selectedLevels.size === 0){
        return false;
    }

    if(selectedLevels.has(node.levelText)){
        return true;
    }

    return node.children.some(child => shouldShowNode(child));
}

function isPathOnly(node){
    if(selectedLevels.size === 0){
        return false;
    }

    return !selectedLevels.has(node.levelText);
}

function getFilteredPersons(){
    return filteredPersonRows;
}

function getOwnPeopleByLegal(node){
    return ownPeopleCountCache[node.deptCode] || 0;
}

function getTotalPeopleByLegal(node){
    if(totalPeopleCountCache.has(node.deptCode)){
        return totalPeopleCountCache.get(node.deptCode);
    }

    let total = getOwnPeopleByLegal(node);

    node.children.forEach(child => {
        total += getTotalPeopleByLegal(child);
    });

    totalPeopleCountCache.set(node.deptCode, total);
    return total;
}

function findNodeByDeptCode(deptCode){
    const found = allNodes.find(n => n.deptCode === deptCode);
    if(found) return found;

    for(const root of focusNodes){
        const result = findNodeInTree(root, deptCode);
        if(result) return result;
    }

    return null;
}

function findNodeInTree(node, deptCode){
    if(node.deptCode === deptCode){
        return node;
    }

    for(const child of node.children){
        const result = findNodeInTree(child, deptCode);
        if(result) return result;
    }

    return null;
}

function getDescendantDeptCodes(node){
    let codes = [node.deptCode];

    node.children.forEach(child => {
        codes = codes.concat(getDescendantDeptCodes(child));
    });

    return codes;
}

function showDepartmentPersons(deptCode, type = "own"){
    currentSelectedDeptCode = deptCode;
    currentSelectedPersonType = type;

    const node = findNodeByDeptCode(deptCode);
    const deptName = node ? node.row["部門全名"] : deptCode;

    let persons = getFilteredPersons();

    if(type === "total" && node){
        const deptCodes = getDescendantDeptCodes(node);

        persons = persons.filter(person => {
            const personDeptCode = String(person["部門代碼"] || "").trim();
            return deptCodes.includes(personDeptCode);
        });
    }else{
        persons = persons.filter(person => {
            return String(person["部門代碼"] || "").trim() === deptCode;
        });
    }

    const summary = document.getElementById("personSummary");
    const panel = document.getElementById("personPanel");

    const rangeText = type === "total" ? "含轄下" : "本單位";

    summary.innerText = `${deptName}｜部門代碼：${deptCode}｜${rangeText}人員 ${persons.length} 人`;

    if(persons.length === 0){
        panel.innerHTML = `
            <div class="noPerson">
                此部門目前查無符合條件的人員資訊。<br>
                請確認「人員資訊」分頁的部門代碼是否與「部門資訊」一致。
            </div>
        `;
        return;
    }

    panel.innerHTML = `
        <table class="personTable">
            <thead>
                <tr>
                    <th>所屬法人</th>
                    <th>部門代碼</th>
                    <th>部門名稱</th>
                    <th>員工工號</th>
                    <th>員工姓名</th>
                    <th>職稱名稱</th>
                    <th>資位</th>
                </tr>

}

function getNodeTitle(node){
    if(node.isVirtualRoot){
        return node.row["部門全名"] || "-";
    }

    if(node.isLegalEntity){
        return "法人：" + node.row["部門全名"];
    }

    return node.row["部門全名"] || "-";
}

function createTreeNodeElement(node, currentDepth = 1){
    const li = document.createElement("li");
    const maxDepth = getMaxDisplayDepth();
    const visibleChildren = node.children.filter(child => shouldShowNode(child));
    const canShowChildren = currentDepth < maxDepth;
    const hasChildren = canShowChildren && visibleChildren.length > 0;

    const nodeDiv = document.createElement("div");
    nodeDiv.className = "node";

    if(isPathOnly(node)){
        nodeDiv.classList.add("pathOnly");
    }

    nodeDiv.dataset.search = getSearchText(node);

    nodeDiv.innerHTML = `
        <div class="nodeHeader">
            ${
                hasChildren
                ? `<span class="toggle">${node.expanded ? "－" : "＋"}</span>`
                : `<span class="emptyToggle"></span>`
            }
            <span class="deptName">${getNodeTitle(node)}</span>
        </div>
        <div class="nodeInfo">
            ／ ${renderTreeNodeInfo(node)}
        </div>
    `;

    bindPeopleLinks(nodeDiv);

    nodeDiv.addEventListener("click", function(e){
        e.stopPropagation();

        if(!node.isLegalEntity && !node.isVirtualRoot){
            showDepartmentPersons(node.deptCode, "own");
        }

        if(hasChildren){
            node.expanded = !node.expanded;
            renderChart();
        }
    });

    li.appendChild(nodeDiv);

    if(hasChildren){
        const ul = document.createElement("ul");

        if(!node.expanded){
            ul.className = "hidden";
        }

        visibleChildren.forEach(child => {
            ul.appendChild(createTreeNodeElement(child, currentDepth + 1));
        });

        li.appendChild(ul);
    }

    return li;
}

function createOrgNodeElement(node, currentDepth = 1){
    const maxDepth = getMaxDisplayDepth();
    const visibleChildren = node.children.filter(child => shouldShowNode(child));
    const canShowChildren = currentDepth < maxDepth;
    const hasChildren = canShowChildren && visibleChildren.length > 0;

    const group = document.createElement("div");
    group.className = "orgNodeGroup";

    if(hasChildren && node.expanded){
        group.classList.add("hasChildren");
    }

    const nodeDiv = document.createElement("div");
    nodeDiv.className = "orgNode";

    if(isPathOnly(node)){
        nodeDiv.classList.add("pathOnly");
    }

    nodeDiv.dataset.search = getSearchText(node);

    nodeDiv.innerHTML = `
        <span class="deptName">${getNodeTitle(node)}</span>
        <div class="nodeInfo">
            ${renderNodeInfo(node)}
        </div>
    `;

    bindPeopleLinks(nodeDiv);

    nodeDiv.addEventListener("click", function(e){
        e.stopPropagation();

        if(!node.isLegalEntity && !node.isVirtualRoot){
            showDepartmentPersons(node.deptCode, "own");
        }

        if(hasChildren){
            node.expanded = !node.expanded;
            renderChart();

            if(currentViewMode === "org"){
                requestAnimationFrame(updateOrgConnectorLines);
            }
        }
    });

    group.appendChild(nodeDiv);

    if(hasChildren && node.expanded){
        const childrenBox = document.createElement("div");
        childrenBox.className = "orgChildren";

        if(visibleChildren.length > 1){
            childrenBox.classList.add("hasMultiple");
        }

        visibleChildren.forEach(child => {
            childrenBox.appendChild(createOrgNodeElement(child, currentDepth + 1));
        });

        group.appendChild(childrenBox);
    }

    return group;
}

function updateOrgConnectorLines(){
    document.querySelectorAll(".orgChildren").forEach(box => {
        box.querySelectorAll(":scope > .orgConnectorLine").forEach(line => line.remove());

        const groups = [...box.children].filter(el => el.classList.contains("orgNodeGroup"));

        if(groups.length < 2) return;

        const firstRowTop = groups[0].offsetTop;
        const sameRow = groups.every(group => Math.abs(group.offsetTop - firstRowTop) < 5);

        if(!sameRow) return;

        const first = groups[0];
        const last = groups[groups.length - 1];

        const firstCenter = first.offsetLeft + first.offsetWidth / 2;
        const lastCenter = last.offsetLeft + last.offsetWidth / 2;

        const line = document.createElement("div");
        line.className = "orgConnectorLine";
        line.style.left = firstCenter + "px";
        line.style.width = (lastCenter - firstCenter) + "px";

        box.prepend(line);
    });
}

function normalizeText(text){
    return String(text || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/　/g, "");
}

function getSearchText(node){
    return normalizeText([
        node.row["部門全名"],
        node.row["主管一姓名"],
        node.row["主管一職稱"],
        node.row["部門代碼"],
        node.row["費用代碼"],
        node.row["公司代碼"]
    ].join(" "));
}

function isFuzzyMatch(searchText, keyword){
    const normalizedKeyword = normalizeText(keyword);

    if(!normalizedKeyword) return false;

    const keywords = String(keyword)
        .trim()
        .split(/\s+/)
        .map(k => normalizeText(k))
        .filter(Boolean);

    if(searchText.includes(normalizedKeyword)){
        return true;
    }

    if(keywords.length > 1){
        return keywords.every(k => searchText.includes(k));
    }

    return false;
}

function getSpecialSearchType(keyword){
    const k = normalizeText(keyword);

    if(k === "*集團"){
        return "allGroup";
    }

    if(k === "*次集團"){
        return "subGroup";
    }

    if(k === "*集團中央"){
        return "groupCenter";
    }

    return "";
}

function getSpecialDisplayKeyword(keyword){
    const type = getSpecialSearchType(keyword);

    if(type === "allGroup") return "集團";
    if(type === "subGroup") return "次集團";
    if(type === "groupCenter") return "集團中央";

    return keyword;
}

function isSubGroupNode(node){
    const name = normalizeText(node.row["部門全名"]);
    return name.includes("次集團") || name.includes("事業群");
}

function createVirtualNode(title, children){
    const total = children.reduce((sum, node) => sum + getTotalPeopleByLegal(node), 0);

    return {
        row:{
            "公司代碼":"",
            "層級":"虛擬法人",
            "上級部門":"",
            "部門代碼":title,
            "費用代碼":"",
            "部門全名":title,
            "主管一姓名":"",
            "主管一職稱":"",
            "在職人數":0
        },
        deptCode:title,
        parentCode:"",
        levelText:"虛擬法人",
        level:0,
        order:-1,
        ownPeople:0,
        totalPeople:total,
        children:children,
        expanded:true,
        isLegalEntity:false,
        isVirtualRoot:true
    };
}

function isUnderAnyNode(node, parentNodes){
    return parentNodes.some(parent => {
        return parent === node || isDescendantOf(node, parent);
    });
}

function findSpecialMatchedNodes(type){
    const subGroupRoots = filterTopMatchedNodes(
        allNodes.filter(node => !node.isLegalEntity && isSubGroupNode(node))
    );

    const groupCenterRoots = filterTopMatchedNodes(
        allNodes.filter(node => {
            return (
                !node.isLegalEntity &&
                !isSubGroupNode(node) &&
                !isUnderAnyNode(node, subGroupRoots)
            );
        })
    );

    const groupCenterNode = createVirtualNode("集團中央", groupCenterRoots);
    const subGroupNode = createVirtualNode("次集團", subGroupRoots);

    if(type === "allGroup"){
        return [
            createVirtualNode("集團", [
                groupCenterNode,
                subGroupNode
            ])
        ];
    }

    if(type === "subGroup"){
        return [subGroupNode];
    }

    if(type === "groupCenter"){
        return [groupCenterNode];
    }

    return [];
}

function expandAll(){
    allNodes.forEach(node => node.expanded = true);

    function expandRecursive(node){
        node.expanded = true;
        node.children.forEach(child => expandRecursive(child));
    }

    focusNodes.forEach(node => expandRecursive(node));

    renderChart();
}

function collapseAll(){
    allNodes.forEach(node => node.expanded = false);

    function collapseRecursive(node){
        node.expanded = false;
        node.children.forEach(child => collapseRecursive(child));
    }

    focusNodes.forEach(node => collapseRecursive(node));

    renderChart();
}

function searchTree(jumpToFirst = false){
    const rawKeyword = document.getElementById("searchInput").value.trim();
    const keyword = getSpecialDisplayKeyword(rawKeyword);
    const specialType = getSpecialSearchType(rawKeyword);
    const focusChecked = document.getElementById("focusCheckbox").checked;

    setTimeout(() => {
        const nodes = document.querySelectorAll(".node, .orgNode");
        let firstMatch = null;

        nodes.forEach(node => {
            node.classList.remove("match");

            if(keyword && isFuzzyMatch(node.dataset.search, keyword)){
                if(!firstMatch){
                    firstMatch = node;
                }

                if(!focusChecked){
                    node.classList.add("match");
                }
            }
        });

        if(jumpToFirst && firstMatch){
            firstMatch.scrollIntoView({
                behavior:"smooth",
                block:"center",
                inline:"center"
            });
        }

        if(jumpToFirst && rawKeyword && !firstMatch && !specialType){
            alert("找不到符合的部門、主管或代碼");
        }
    }, 0);
}

function findMatchedNodes(keyword){
    if(!keyword) return [];

    const matched = allNodes.filter(node => {
        return isFuzzyMatch(getSearchText(node), keyword);
    });

    return filterTopMatchedNodes(matched);
}

function filterTopMatchedNodes(nodes){
    return nodes.filter(node => {
        return !nodes.some(other => {
            return other !== node && isDescendantOf(node, other);
        });
    });
}

function isDescendantOf(node, possibleParent){
    return possibleParent.children.some(child => {
        return child === node || isDescendantOf(node, child);
    });
}

function searchAndJump(){
    const keyword = document.getElementById("searchInput").value.trim();
    const focusChecked = document.getElementById("focusCheckbox").checked;
    const specialType = getSpecialSearchType(keyword);

    if(!keyword){
        focusNodes = [];
        renderChart();
        return;
    }

    if(specialType){
        focusNodes = findSpecialMatchedNodes(specialType);
        allNodes.forEach(node => node.expanded = true);

        function expandRecursive(node){
            node.expanded = true;
            node.children.forEach(child => expandRecursive(child));
        }

        focusNodes.forEach(node => expandRecursive(node));
        renderChart();

        setTimeout(() => searchTree(true), 0);

        return;
    }

    if(focusChecked){
        const matchedNodes = findMatchedNodes(keyword);

        if(matchedNodes.length === 0){
            alert("找不到符合的部門、主管或代碼");
            return;
        }

        focusNodes = matchedNodes;
        allNodes.forEach(node => node.expanded = true);

        function expandRecursive(node){
            node.expanded = true;
            node.children.forEach(child => expandRecursive(child));
        }

        focusNodes.forEach(node => expandRecursive(node));
        renderChart();

        setTimeout(() => searchTree(true), 0);
    }else{
        focusNodes = [];
        allNodes.forEach(node => node.expanded = true);
        renderChart();

        setTimeout(() => searchTree(true), 0);
    }
}

function getPdfChartTitle(){
    const displayRoots = focusNodes.length > 0 ? focusNodes : rootNodes;

    if(!displayRoots || displayRoots.length === 0){
        return "組織圖";
    }

    let firstRoot = displayRoots[0];
    let title = "";

    if(firstRoot.isVirtualRoot){
        title = firstRoot.row["部門全名"] || firstRoot.deptCode || "組織圖";
    }else if(firstRoot.isLegalEntity && firstRoot.children && firstRoot.children.length === 1){
        title = firstRoot.children[0].row["部門全名"] || firstRoot.children[0].deptCode || "組織圖";
    }else if(firstRoot.isLegalEntity){
        title = firstRoot.row["部門全名"] || firstRoot.deptCode || "組織圖";
    }else{
        title = firstRoot.row["部門全名"] || firstRoot.deptCode || "組織圖";
    }

    title = String(title).replace(/^法人：/, "").trim();

    return title + "組織圖";
}

function getPdfUpdatedText(){
    const updatedAt = localStorage.getItem(STORAGE_KEY_UPDATED_AT) || getNowText();
    return "更新日期：" + updatedAt;
}

async function preparePdfCanvas(titleText){
    const target = document.getElementById("zoomWrap");

    if(currentViewMode === "org"){
        updateOrgConnectorLines();
    }

    const updatedText = getPdfUpdatedText();
    const originalTransform = target.style.transform;

    target.style.transform = "scale(1)";

    await new Promise(resolve => setTimeout(resolve, 250));

    const exportWrapper = document.createElement("div");
    exportWrapper.className = "pdfExportWrapper";
    exportWrapper.style.position = "absolute";
    exportWrapper.style.left = "-99999px";
    exportWrapper.style.top = "0";
    exportWrapper.style.zIndex = "-1";

    const headerDiv = document.createElement("div");
    headerDiv.className = "pdfExportHeader";

    const titleDiv = document.createElement("div");
    titleDiv.className = "pdfExportTitle";
    titleDiv.innerText = titleText || getPdfChartTitle();

    const dateDiv = document.createElement("div");
    dateDiv.className = "pdfExportDate";
    dateDiv.innerText = updatedText;

    headerDiv.appendChild(titleDiv);
    headerDiv.appendChild(dateDiv);

    const clonedChart = target.cloneNode(true);
    clonedChart.style.transform = "scale(1)";
    clonedChart.style.transformOrigin = "top left";

    exportWrapper.appendChild(headerDiv);
    exportWrapper.appendChild(clonedChart);
    document.body.appendChild(exportWrapper);

    const canvas = await html2canvas(exportWrapper, {
        scale: 2,
        backgroundColor: "#ffffff",
        useCORS: true,
        scrollX: 0,
        scrollY: 0
    });

    document.body.removeChild(exportWrapper);
    target.style.transform = originalTransform;

    return canvas;
}

function saveCanvasAsOneLongPdf(canvas, pdfTitle){
    const imgData = canvas.toDataURL("image/png");

    const canvasRatio = canvas.height / canvas.width;

    let pdfWidth = 1200;
    let pdfHeight = pdfWidth * canvasRatio;

    if(pdfHeight < 210){
        pdfHeight = 210;
    }

    const pdf = new jspdf.jsPDF({
        orientation: pdfWidth >= pdfHeight ? "l" : "p",
        unit: "mm",
        format: [pdfWidth, pdfHeight]
    });

    pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);

    const safeFileName = pdfTitle.replace(/[\\/:*?"<>|]/g, "_");
    pdf.save(safeFileName + ".pdf");
}

function addCanvasMultiPage(pdf, canvas){
    const imgData = canvas.toDataURL("image/png");

    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    const marginX = 8;
    const marginY = 8;

    const imgWidth = pageWidth - marginX * 2;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = marginY;

    pdf.addImage(imgData, "PNG", marginX, position, imgWidth, imgHeight);
    heightLeft -= pageHeight - marginY * 2;

    while(heightLeft > 0){
        pdf.addPage();
        position = marginY - (imgHeight - heightLeft);
        pdf.addImage(imgData, "PNG", marginX, position, imgWidth, imgHeight);
        heightLeft -= pageHeight - marginY * 2;
    }
}

function addCanvasFitOnePage(pdf, canvas, addNewPage){
    if(addNewPage){
        pdf.addPage();
    }

    const imgData = canvas.toDataURL("image/png");

    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    const marginX = 8;
    const marginY = 8;

    const availableWidth = pageWidth - marginX * 2;
    const availableHeight = pageHeight - marginY * 2;

    const canvasRatio = canvas.width / canvas.height;
    const pageRatio = availableWidth / availableHeight;

    let imgWidth;
    let imgHeight;

    if(pageRatio > canvasRatio){
        imgHeight = availableHeight;
        imgWidth = imgHeight * canvasRatio;
    }else{
        imgWidth = availableWidth;
        imgHeight = imgWidth / canvasRatio;
    }

    const x = (pageWidth - imgWidth) / 2;
    const y = (pageHeight - imgHeight) / 2;

    pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
}

async function exportCurrentPdf(pdfTitle){
    const canvas = await preparePdfCanvas(pdfTitle);

    saveCanvasAsOneLongPdf(canvas, pdfTitle);
}

async function exportFitOnePagePdf(pdfTitle){
    const canvas = await preparePdfCanvas(pdfTitle);
    const pdf = new jspdf.jsPDF("l", "mm", "a4");
    addCanvasFitOnePage(pdf, canvas, false);

    const safeFileName = pdfTitle.replace(/[\\/:*?"<>|]/g, "_");
    pdf.save(safeFileName + ".pdf");
}

function getSplitBaseNode(){
    const displayRoots = focusNodes.length > 0 ? focusNodes : rootNodes;
    if(!displayRoots || displayRoots.length === 0){
        return null;
    }
    return displayRoots[0];
}

async function exportSplitByFirstLevelPdf(pdfTitle){
    const baseNode = getSplitBaseNode();

    if(!baseNode){
        alert("目前沒有可分頁匯出的組織圖");
        return;
    }

    const originalFocusNodes = focusNodes.slice();
    const originalViewMode = currentViewMode;

    const pdf = new jspdf.jsPDF("l", "mm", "a4");
    let hasPage = false;

    focusNodes = [baseNode];
    renderChart();
    await new Promise(resolve => setTimeout(resolve, 300));

    const overviewCanvas = await preparePdfCanvas(pdfTitle);
    addCanvasFitOnePage(pdf, overviewCanvas, false);
    hasPage = true;

    const children = baseNode.children.filter(child => shouldShowNode(child));

    for(const child of children){
        focusNodes = [child];
        renderChart();
        await new Promise(resolve => setTimeout(resolve, 300));

        const childTitle = `${String(child.row["部門全名"] || child.deptCode || "子部門")}組織圖`;
        const childCanvas = await preparePdfCanvas(childTitle);

        addCanvasFitOnePage(pdf, childCanvas, hasPage);
        hasPage = true;
    }

    focusNodes = originalFocusNodes;
    currentViewMode = originalViewMode;
    renderChart();

    const safeFileName = pdfTitle.replace(/[\\/:*?"<>|]/g, "_");
    pdf.save(safeFileName + "_分頁.pdf");
}

async function exportPDF(){
    const target = document.getElementById("zoomWrap");

    if(!target || allNodes.length === 0){
        alert("請先上傳 Excel 並產生組織圖");
        return;
    }

    const mode = document.getElementById("pdfExportMode")?.value || "current";
    const pdfTitle = getPdfChartTitle();

    if(mode === "current"){
        await exportCurrentPdf(pdfTitle);
        return;
    }

    if(mode === "fitOnePage"){
        await exportFitOnePagePdf(pdfTitle);
        return;
    }

    if(mode === "splitByFirstLevel"){
        await exportSplitByFirstLevelPdf(pdfTitle);
        return;
    }
}
