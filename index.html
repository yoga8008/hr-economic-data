<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣重要經社指標</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{ font-family: Arial, sans-serif; padding:20px; }
.filter{ margin-bottom:20px; }
.card{ margin-bottom:60px; width:900px; }
canvas{ max-width:900px; height:300px !important; }
select, button{ padding:6px 10px; margin-right:10px; }
label{ margin-right:10px; }
</style>
</head>

<body>

<h1>台灣經濟數據</h1>

<div class="filter">
    起：<select id="startMonth"></select>
    迄：<select id="endMonth"></select>

    <label>
        <input type="checkbox" id="compareMode">
        同期比較
    </label>

    <button onclick="filterData()">查詢</button>
</div>

<div class="card">
    <h2>CPI 年增率</h2>
    <canvas id="cpiChart"></canvas>
</div>

<div class="card">
    <h2>失業率</h2>
    <canvas id="unemploymentChart"></canvas>
</div>

<script>
let allData = [];
let cpiChart;
let unemploymentChart;

fetch("./data/taiwan_cpi_unemployment.json")
.then(res => res.json())
.then(data => {
    allData = data;
    initMonthSelect();
    filterData();
});

function initMonthSelect(){
    const startSelect = document.getElementById("startMonth");
    const endSelect = document.getElementById("endMonth");

    allData.forEach(d => {
        const value = d["年月"];
        startSelect.innerHTML += `<option value="${value}">${value}</option>`;
        endSelect.innerHTML += `<option value="${value}">${value}</option>`;
    });

    const latest12 = allData.slice(-12);
    startSelect.value = latest12[0]["年月"];
    endSelect.value = allData[allData.length - 1]["年月"];
}

function shiftYear(monthText, diff){
    const parts = monthText.split("/");
    const year = Number(parts[0]) + diff;
    const month = parts[1];
    return year + "/" + month;
}

function filterData(){
    const start = document.getElementById("startMonth").value;
    const end = document.getElementById("endMonth").value;
    const compareMode = document.getElementById("compareMode").checked;

    const startDate = new Date(start + "/01");
    const endDate = new Date(end + "/01");

    const monthDiff =
        (endDate.getFullYear() - startDate.getFullYear()) * 12 +
        (endDate.getMonth() - startDate.getMonth());

    if(start > end){
        alert("起始月份不能大於迄止月份");
        return;
    }

    if(monthDiff > 11){
        alert("最多只能選擇12個月區間");
        return;
    }

    const currentData = allData.filter(d => {
        return d["年月"] >= start && d["年月"] <= end;
    });

    let previousData = [];

    if(compareMode){
        const previousStart = shiftYear(start, -1);
        const previousEnd = shiftYear(end, -1);

        previousData = allData.filter(d => {
            return d["年月"] >= previousStart && d["年月"] <= previousEnd;
        });
    }

    drawCharts(currentData, previousData, compareMode);
}

function drawCharts(currentData, previousData, compareMode){
    const labels = currentData.map(d => d["年月"]);

    const currentCpi = currentData.map(d => d["CPI年增率"]);
    const currentUnemployment = currentData.map(d => d["失業率"]);

    const previousCpi = previousData.map(d => d["CPI年增率"]);
    const previousUnemployment = previousData.map(d => d["失業率"]);

    if(cpiChart) cpiChart.destroy();
    if(unemploymentChart) unemploymentChart.destroy();

    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,

        layout: {
            padding: { top: 50 }
        },

        plugins: {
            legend: {
    display: compareMode,
    position: "top",
    labels: {
        padding: 20,
        font: {
            size: 14
        }
    }
},

            tooltip: {
                callbacks: {
                    label: function(context){
                        return context.dataset.label + "：" + context.parsed.y.toFixed(1) + "%";
                    },
                    afterBody: function(context){
                        const index = context[0].dataIndex;
                        const summary = currentData[index]["AI摘要"];

                        if(summary){
                            return "摘要：" + summary;
                        }

                        return "";
                    }
                }
            },

            datalabels: {
                align: "top",
                anchor: "end",
                offset: 8,
                clamp: true,
                formatter: function(value){
                    return value.toFixed(1) + "%";
                },
                font: {
                    weight: "bold",
                    size: 14
                }
            }
        },

        scales: {
            y: {
                ticks: {
                    callback: function(value){
                        return value.toFixed(1) + "%";
                    }
                }
            }
        }
    };

    const cpiDatasets = [
        {
            label: "本期 CPI",
            data: currentCpi,
            tension: 0.2,
            pointRadius: 4
        }
    ];

    const unemploymentDatasets = [
        {
            label: "本期失業率",
            data: currentUnemployment,
            tension: 0.2,
            pointRadius: 4
        }
    ];

    if(compareMode){
        cpiDatasets.push({
            label: "去年同期 CPI",
            data: previousCpi,
            tension: 0.2,
            pointRadius: 4,
            borderDash: [6, 4]
        });

        unemploymentDatasets.push({
            label: "去年同期失業率",
            data: previousUnemployment,
            tension: 0.2,
            pointRadius: 4,
            borderDash: [6, 4]
        });
    }

    cpiChart = new Chart(document.getElementById("cpiChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: cpiDatasets
        },
        options: commonOptions,
        plugins: [ChartDataLabels]
    });

    unemploymentChart = new Chart(document.getElementById("unemploymentChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: unemploymentDatasets
        },
        options: commonOptions,
        plugins: [ChartDataLabels]
    });
}
</script>
<div style="margin-top:40px; font-size:14px; color:#666;">

    資料來源：
    
    <a 
        href="https://www.stat.gov.tw/"
        target="_blank"
    >
        中華民國統計資訊網 / 主計總處
    </a>

</div>
</body>
</html>
