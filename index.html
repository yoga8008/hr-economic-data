<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣重要經社指標</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f3f4f6;
}

h1{
    margin-bottom:20px;
}

.layout{
    display:flex;
    gap:30px;
    align-items:flex-start;
}

.leftPanel{
    width:65%;
    background:#f3f4f6;
}

.rightPanel{
    width:35%;
    position:sticky;
    top:20px;
    background:#f3f4f6;
}

.filter{
    margin-bottom:20px;
}

.card{
    margin-bottom:30px;
    width:100%;
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    background:#ffffff;
    box-sizing:border-box;
}

.desc{
    margin-bottom:10px;
    color:#666;
    font-size:14px;
}

canvas{
    width:100% !important;
    height:300px !important;
    margin-top:25px;
}

select, button{
    padding:6px 10px;
    margin-right:10px;
}

label{
    margin-right:10px;
}

.newsCard{
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    background:#ffffff;
}

.newsCard h2{
    margin-top:0;
}

.newsItem{
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #e5e5e5;
}

.newsDate{
    font-size:12px;
    color:#888;
    margin-bottom:4px;
}

.newsUnit{
    font-size:12px;
    color:#666;
    margin-bottom:4px;
}

.newsTitle{
    font-weight:bold;
    line-height:1.5;
    font-size:14px;
}

.newsTitle a{
    color:#1a5fb4;
    text-decoration:none;
}

.newsTitle a:hover{
    text-decoration:underline;
}

.source{
    margin-top:40px;
    font-size:14px;
    color:#666;
}
</style>
</head>

<body>

<h1>台灣重要經社指標</h1>

<div class="layout">

<div class="leftPanel">

    <div class="card">
        <h2>GDP 經濟成長率</h2>
        <div class="desc">說明：國內生產毛額（GDP）成長率，反映整體經濟成長情況。</div>

        <div class="filter">
            年度：<select id="gdpYear"></select>

            季度：
            <select id="gdpQuarter">
                <option value="">全部季度</option>
                <option value="Q1">第一季</option>
                <option value="Q2">第二季</option>
                <option value="Q3">第三季</option>
                <option value="Q4">第四季</option>
            </select>

            <label>
                <input type="checkbox" id="gdpCompare">
                同期比較
            </label>

            <button onclick="drawGDP()">查詢</button>
        </div>

        <canvas id="gdpChart"></canvas>
    </div>

<div class="card">

    <div class="filter">
        起：<select id="startMonth"></select>
        迄：<select id="endMonth"></select>

        <label>
            <input type="checkbox" id="compareMode">
            同期比較
        </label>

        <button onclick="filterData()">查詢</button>
    </div>

    <h2>消費者物價指數年增率(CPI)</h2>
    <div class="desc">說明：民眾日常生活物價上漲或下跌的指標。﹝基期年2021年﹞</div>
    <canvas id="cpiChart"></canvas>

    <h2 style="margin-top:40px;">失業率</h2>
    <div class="desc">說明：「想工作卻找不到工作的人」占勞動力的比例。</div>
    <canvas id="unemploymentChart"></canvas>

</div>

    <div class="source">
        資料來源：
        <a href="https://www.stat.gov.tw/" target="_blank">
            中華民國統計資訊網 / 主計總處
        </a>
    </div>

</div>

<div class="rightPanel">
    <div class="newsCard">
        <h2>重要公告彙整</h2>
        <div id="newsList">載入中...</div>
    </div>
</div>

</div>

<script>
let allData = [];
let gdpData = [];

let gdpChart;
let cpiChart;
let unemploymentChart;

fetch("./data/taiwan_cpi_unemployment.json")
.then(res => res.json())
.then(data => {
    allData = data;
    initMonthSelect();
    filterData();
});

fetch("./data/taiwan_gdp.json")
.then(res => res.json())
.then(data => {
    gdpData = data;
    initGDPSelect();
    drawGDP();
});

fetch("./data/taiwan_news.json")
.then(res => res.json())
.then(news => {
    const newsList = document.getElementById("newsList");
    newsList.innerHTML = "";

    news
    .sort((a,b) => b.日期.localeCompare(a.日期))
    .slice(0,10)
    .forEach(item => {
        newsList.innerHTML += `
            <div class="newsItem">
                <div class="newsDate">${item.日期}</div>
                <div class="newsUnit">${item.單位}</div>
                <div class="newsTitle">
                    <a href="${item.連結}" target="_blank">
                        ${item.標題}
                    </a>
                </div>
            </div>
        `;
    });
})
.catch(() => {
    document.getElementById("newsList").innerHTML = "尚未建立公告資料";
});

function initMonthSelect(){
    const startSelect = document.getElementById("startMonth");
    const endSelect = document.getElementById("endMonth");

    allData.forEach(d => {
        const value = d["年月"];
        startSelect.innerHTML += `<option value="${value}">${value}</option>`;
        endSelect.innerHTML += `<option value="${value}">${value}</option>`;
    });

    const latest12 = allData.slice(-12);
    startSelect.value = latest12[0]["年月"];
    endSelect.value = allData[allData.length - 1]["年月"];
}

function initGDPSelect(){
    const yearSelect = document.getElementById("gdpYear");
    const years = [...new Set(gdpData.map(d => d["年度"]))];

    years.forEach(year => {
        yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
    });

    yearSelect.value = years[years.length - 1];
}

function shiftYear(monthText, diff){
    const parts = monthText.split("/");
    const year = Number(parts[0]) + diff;
    const month = parts[1];
    return year + "/" + month;
}

function filterData(){
    const start = document.getElementById("startMonth").value;
    const end = document.getElementById("endMonth").value;
    const compareMode = document.getElementById("compareMode").checked;

    const startDate = new Date(start + "/01");
    const endDate = new Date(end + "/01");

    const monthDiff =
        (endDate.getFullYear() - startDate.getFullYear()) * 12 +
        (endDate.getMonth() - startDate.getMonth());

    if(start > end){
        alert("起始月份不能大於迄止月份");
        return;
    }

    if(monthDiff > 11){
        alert("最多只能選擇12個月區間");
        return;
    }

    const currentData = allData.filter(d => {
        return d["年月"] >= start && d["年月"] <= end;
    });

    let previousData = [];

    if(compareMode){
        const previousStart = shiftYear(start, -1);
        const previousEnd = shiftYear(end, -1);

        previousData = allData.filter(d => {
            return d["年月"] >= previousStart && d["年月"] <= previousEnd;
        });
    }

    drawMonthlyCharts(currentData, previousData, compareMode);
}

function drawGDP(){
    const year = document.getElementById("gdpYear").value;
    const quarter = document.getElementById("gdpQuarter").value;
    const compare = document.getElementById("gdpCompare").checked;

    let current = gdpData.filter(d => d["年度"] === year);

    if(quarter){
        current = current.filter(d => d["季度"] === quarter);
    }

    let previous = [];

    if(compare){
        const previousYear = String(Number(year) - 1);
        previous = gdpData.filter(d => d["年度"] === previousYear);

        if(quarter){
            previous = previous.filter(d => d["季度"] === quarter);
        }
    }

    const labels = current.map(d => quarter ? `${d["年度"]} ${d["季度"]}` : d["季度"]);
    const currentGDP = current.map(d => d["GDP成長率"]);
    const previousGDP = previous.map(d => d["GDP成長率"]);

    if(gdpChart) gdpChart.destroy();

    const datasets = [{
        label: year + " GDP",
        data: currentGDP,
        tension: 0.2,
        pointRadius: 4,
        clip: false
    }];

    if(compare){
        datasets.push({
            label: String(Number(year) - 1) + " GDP",
            data: previousGDP,
            tension: 0.2,
            pointRadius: 4,
            borderDash: [6,4],
            clip: false
        });
    }

    gdpChart = new Chart(document.getElementById("gdpChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: datasets
        },
        options: getChartOptions(compare, current),
        plugins: [ChartDataLabels]
    });
}

function drawMonthlyCharts(currentData, previousData, compareMode){
    const labels = currentData.map(d => d["年月"]);

    const currentCpi = currentData.map(d => d["CPI年增率"]);
    const currentUnemployment = currentData.map(d => d["失業率"]);

    const previousCpi = previousData.map(d => d["CPI年增率"]);
    const previousUnemployment = previousData.map(d => d["失業率"]);

    if(cpiChart) cpiChart.destroy();
    if(unemploymentChart) unemploymentChart.destroy();

    const cpiDatasets = [{
        label: "本期 CPI",
        data: currentCpi,
        tension: 0.2,
        pointRadius: 4,
        clip: false
    }];

    const unemploymentDatasets = [{
        label: "本期失業率",
        data: currentUnemployment,
        tension: 0.2,
        pointRadius: 4,
        clip: false
    }];

    if(compareMode){
        cpiDatasets.push({
            label: "去年同期 CPI",
            data: previousCpi,
            tension: 0.2,
            pointRadius: 4,
            borderDash: [6, 4],
            clip: false
        });

        unemploymentDatasets.push({
            label: "去年同期失業率",
            data: previousUnemployment,
            tension: 0.2,
            pointRadius: 4,
            borderDash: [6, 4],
            clip: false
        });
    }

    cpiChart = new Chart(document.getElementById("cpiChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: cpiDatasets
        },
        options: getChartOptions(compareMode, currentData),
        plugins: [ChartDataLabels]
    });

    unemploymentChart = new Chart(document.getElementById("unemploymentChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: unemploymentDatasets
        },
        options: getChartOptions(compareMode, currentData),
        plugins: [ChartDataLabels]
    });
}

function getChartOptions(showLegend, sourceData){
    return {
        responsive: true,
        maintainAspectRatio: false,

        layout: {
            padding: {
                top: 60,
                right: 20,
                left: 10,
                bottom: 10
            }
        },

        plugins: {
            legend: {
                display: showLegend,
                position: "bottom",
                align: "center",
                labels: {
                    padding: 18,
                    font: { size: 14 }
                }
            },

            tooltip: {
                callbacks: {
                    label: function(context){
                        return context.dataset.label + "：" + context.parsed.y.toFixed(1) + "%";
                    },
                    afterBody: function(context){
                        const index = context[0].dataIndex;
                        const summary = sourceData[index]["AI摘要"];
                        const type = sourceData[index]["類型"];

                        let text = "";

                        if(type){
                            text += "類型：" + type;
                        }

                        if(summary){
                            text += (text ? "\n" : "") + "摘要：" + summary;
                        }

                        return text;
                    }
                }
            },

            datalabels: {
                align: "top",
                anchor: "end",
                offset: 12,
                clamp: false,
                clip: false,
                formatter: function(value){
                    return value.toFixed(1) + "%";
                },
                font: {
                    weight: "bold",
                    size: 14
                }
            }
        },

        scales: {
            y: {
                ticks: {
                    callback: function(value){
                        return value.toFixed(1) + "%";
                    }
                }
            }
        }
    };
}
</script>

</body>
</html>
