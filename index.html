<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣經濟數據</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
}

.filter{
    margin-bottom:20px;
}

.card{
    margin-bottom:40px;
    width:900px;
}

canvas{
    max-width:900px;
    height:250px !important;
}

select{
    padding:6px 12px;
}
</style>
</head>

<body>

<h1>台灣經濟數據</h1>

<div class="filter">
    <label>顯示區間：</label>
    <select id="monthRange" onchange="changeRange()">
        <option value="12">近12個月至今</option>
        <option value="24">近24個月至今</option>
        <option value="36" selected>近36個月至今</option>
    </select>
</div>

<div class="card">
    <h2>CPI 年增率</h2>
    <canvas id="cpiChart"></canvas>
</div>

<div class="card">
    <h2>失業率</h2>
    <canvas id="unemploymentChart"></canvas>
</div>

<script>
let allData = [];
let cpiChart;
let unemploymentChart;

fetch("./data/taiwan_cpi_unemployment.json")
.then(res => res.json())
.then(data => {
    allData = data;
    changeRange();
});

function changeRange(){
    const months = Number(document.getElementById("monthRange").value);
    const data = allData.slice(-months);
    drawCharts(data);
}

function drawCharts(data){
    const labels = data.map(d => d["年月"]);
    const cpiData = data.map(d => d["CPI年增率"]);
    const unemploymentData = data.map(d => d["失業率"]);

    if(cpiChart) cpiChart.destroy();
    if(unemploymentChart) unemploymentChart.destroy();

    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                display: false
            },
            datalabels: {
                align: "top",
                anchor: "end",
                formatter: function(value){
                    return value.toFixed(1) + "%";
                },
                font: {
                    weight: "bold",
                    size: 11
                }
            }
        },
        scales: {
            y: {
                ticks: {
                    callback: function(value){
                        return value + "%";
                    }
                }
            }
        }
    };

    cpiChart = new Chart(document.getElementById("cpiChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: cpiData,
                tension: 0.2,
                pointRadius: 4,
                pointHoverRadius: 6
            }]
        },
        options: commonOptions,
        plugins: [ChartDataLabels]
    });

    unemploymentChart = new Chart(document.getElementById("unemploymentChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: unemploymentData,
                tension: 0.2,
                pointRadius: 4,
                pointHoverRadius: 6
            }]
        },
        options: commonOptions,
        plugins: [ChartDataLabels]
    });
}
</script>

</body>
</html>
