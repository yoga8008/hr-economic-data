<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台灣經濟數據</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    padding:20px;
}

.filter{
    margin-bottom:20px;
}

.card{
    margin-bottom:40px;
    width:900px;
}

canvas{
    max-width:900px;
    height:250px !important;
}

button{
    margin-left:10px;
    padding:6px 14px;
}
</style>
</head>

<body>

<h1>台灣經濟數據</h1>

<div class="filter">
    起：
    <input type="month" id="startMonth">

    迄：
    <input type="month" id="endMonth">

    <button onclick="filterData()">查詢</button>
</div>

<div class="card">
    <h2>CPI 年增率</h2>
    <canvas id="cpiChart"></canvas>
</div>

<div class="card">
    <h2>失業率</h2>
    <canvas id="unemploymentChart"></canvas>
</div>

<script>
let allData = [];
let cpiChart;
let unemploymentChart;

fetch("./data/taiwan_cpi_unemployment.json")
.then(res => res.json())
.then(data => {
    allData = data;

    const latest12 = allData.slice(-12);
    document.getElementById("startMonth").value = latest12[0]["年月"].replace("/", "-");
    document.getElementById("endMonth").value = latest12[latest12.length - 1]["年月"].replace("/", "-");

    drawCharts(latest12);
});

function filterData(){
    const start = document.getElementById("startMonth").value;
    const end = document.getElementById("endMonth").value;

    const filtered = allData.filter(d => {
        const month = d["年月"].replace("/", "-");
        return month >= start && month <= end;
    });

    drawCharts(filtered);
}

function drawCharts(data){
    const labels = data.map(d => d["年月"]);
    const cpiData = data.map(d => d["CPI年增率"]);
    const unemploymentData = data.map(d => d["失業率"]);

    if(cpiChart) cpiChart.destroy();
    if(unemploymentChart) unemploymentChart.destroy();

    cpiChart = new Chart(document.getElementById("cpiChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "CPI年增率",
                data: cpiData
            }]
        }
    });

    unemploymentChart = new Chart(document.getElementById("unemploymentChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "失業率",
                data: unemploymentData
            }]
        }
    });
}
</script>

</body>
</html>
