name: Update MOPS HR Disclosure Data

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Run target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - salary
          - welfare
  schedule:
    # A. 非主管全時員工薪資資訊：每年 6/25～7/25 每天跑一次
    # GitHub cron uses UTC; 01:10 UTC = 09:10 Taiwan time.
    # Cron cannot express 6/25～7/25 across two months cleanly, so the job runs in Jun/Jul and the shell guard below filters dates.
    - cron: "10 1 * 6,7 *"
    # B. 員工福利政策及權益維護措施：每月 1 次
    # 01:40 UTC = 09:40 Taiwan time on the first day of each month.
    - cron: "40 1 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Decide update target
        id: decide
        shell: bash
        run: |
          set -e
          TARGET="${{ github.event.inputs.target || '' }}"
          SCHEDULE="${{ github.event.schedule || '' }}"
          TODAY=$(TZ='Asia/Taipei' date +'%m-%d')

          RUN_SALARY="false"
          RUN_WELFARE="false"

          if [ "$TARGET" = "all" ]; then
            RUN_SALARY="true"
            RUN_WELFARE="true"
          elif [ "$TARGET" = "salary" ]; then
            RUN_SALARY="true"
          elif [ "$TARGET" = "welfare" ]; then
            RUN_WELFARE="true"
          elif [ "$SCHEDULE" = "10 1 * 6,7 *" ]; then
            # A: 6/25～7/25 Taiwan date window
            if [[ "$TODAY" > "06-24" && "$TODAY" < "07-26" ]]; then
              RUN_SALARY="true"
            fi
          elif [ "$SCHEDULE" = "40 1 1 * *" ]; then
            # B: monthly
            RUN_WELFARE="true"
          fi

          echo "run_salary=$RUN_SALARY" >> "$GITHUB_OUTPUT"
          echo "run_welfare=$RUN_WELFARE" >> "$GITHUB_OUTPUT"
          echo "Taiwan date: $TODAY"
          echo "Run salary: $RUN_SALARY"
          echo "Run welfare: $RUN_WELFARE"

      - name: Update salary disclosure JSON
        if: steps.decide.outputs.run_salary == 'true'
        run: python scripts/update_employee_salary.py

      - name: Update welfare disclosure JSON
        if: steps.decide.outputs.run_welfare == 'true'
        run: python scripts/update_employee_welfare.py

      - name: Commit updated JSON
        shell: bash
        run: |
          set -e
          if git diff --quiet -- data/*.json; then
            echo "No JSON changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update MOPS HR disclosure data"
          git push
