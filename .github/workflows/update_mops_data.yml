name: Update MOPS HR Disclosure Data

on:
  workflow_dispatch:

  schedule:
    # A. 非主管全時員工薪資資訊
    # 每年 6/25～6/30，每天 09:10 台灣時間執行
    - cron: "10 1 25-30 6 *"

    # A. 非主管全時員工薪資資訊
    # 每年 7/1～7/25，每天 09:10 台灣時間執行
    - cron: "10 1 1-25 7 *"

    # B. 員工福利政策及權益維護措施
    # 每月 1 日 09:40 台灣時間執行
    - cron: "40 1 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python
        shell: powershell
        run: |
          $python = "C:\Users\youji\AppData\Local\Python\pythoncore-3.11-64\python.exe"
          & $python --version
          & $python -m pip --version

      - name: Install dependencies
        shell: powershell
        run: |
          $python = "C:\Users\youji\AppData\Local\Python\pythoncore-3.11-64\python.exe"
          & $python -m pip install --upgrade pip
          & $python -m pip install -r scripts/requirements.txt

      - name: Decide update target
        shell: powershell
        run: |
          $eventName = "${{ github.event_name }}"
          $schedule = "${{ github.event.schedule }}"

          $runSalary = "false"
          $runWelfare = "false"

          if ($eventName -eq "workflow_dispatch") {
            $runSalary = "true"
            $runWelfare = "true"
          }
          elseif ($schedule -eq "10 1 25-30 6 *" -or $schedule -eq "10 1 1-25 7 *") {
            $runSalary = "true"
          }
          elseif ($schedule -eq "40 1 1 * *") {
            $runWelfare = "true"
          }

          "RUN_SALARY=$runSalary" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RUN_WELFARE=$runWelfare" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "RUN_SALARY=$runSalary"
          Write-Host "RUN_WELFARE=$runWelfare"

      - name: Update salary disclosure JSON
        if: env.RUN_SALARY == 'true'
        shell: powershell
        run: |
          $python = "C:\Users\youji\AppData\Local\Python\pythoncore-3.11-64\python.exe"
          & $python scripts/update_employee_salary.py

      - name: Update welfare disclosure JSON
        if: env.RUN_WELFARE == 'true'
        shell: powershell
        run: |
          $python = "C:\Users\youji\AppData\Local\Python\pythoncore-3.11-64\python.exe"
          & $python scripts/update_employee_welfare.py

      - name: Commit updated data
        shell: powershell
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/employee_salary_disclosure.json data/employee_welfare_disclosure.json

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }

          git commit -m "Update MOPS HR disclosure data"
          git push
