name: Update MOPS HR Disclosure Data

on:
  workflow_dispatch:

  schedule:
    # A. 每年 6/25～7/25 每天 09:10 台灣時間跑薪資資料
    # UTC 01:10 = 台灣 09:10
    - cron: "10 1 25-30 6 *"
    - cron: "10 1 1-25 7 *"

    # B. 每月 1 日 09:40 台灣時間跑福利資料
    # UTC 01:40 = 台灣 09:40
    - cron: "40 1 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: powershell
        run: |
          py -3.11 -m pip install --upgrade pip
          py -3.11 -m pip install -r scripts/requirements.txt

      - name: Decide update target
        shell: powershell
        run: |
          $today = Get-Date
          $month = [int]$today.ToString("MM")
          $day = [int]$today.ToString("dd")

          $runSalary = "false"
          $runWelfare = "false"

          if (($month -eq 6 -and $day -ge 25) -or ($month -eq 7 -and $day -le 25)) {
            $runSalary = "true"
          }

          if ($day -eq 1) {
            $runWelfare = "true"
          }

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $runSalary = "true"
            $runWelfare = "true"
          }

          "RUN_SALARY=$runSalary" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RUN_WELFARE=$runWelfare" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update salary disclosure JSON
        if: env.RUN_SALARY == 'true'
        shell: powershell
        run: py -3.11 scripts/update_employee_salary.py

      - name: Update welfare disclosure JSON
        if: env.RUN_WELFARE == 'true'
        shell: powershell
        run: py -3.11 scripts/update_employee_welfare.py

      - name: Commit updated data
        shell: powershell
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/employee_salary_disclosure.json data/employee_welfare_disclosure.json

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No data changes to commit."
            exit 0
          }

          git commit -m "Update MOPS HR disclosure data"
          git push
