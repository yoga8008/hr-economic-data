name: Update MOPS HR Disclosure Data

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Run target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - salary
          - welfare
  schedule:
    # A. 非主管全時員工薪資資訊：每年 6/25～7/25 每天跑一次
    # GitHub cron uses UTC; 01:10 UTC = 09:10 Taiwan time.
    # Cron cannot express 6/25～7/25 across two months cleanly, so the job runs in Jun/Jul and the shell guard below filters dates.
    - cron: "10 1 * 6,7 *"
    # B. 員工福利政策及權益維護措施：每月 1 次
    # 01:40 UTC = 09:40 Taiwan time on the first day of each month.
    - cron: "40 1 1 * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Decide update target
        id: decide
        shell: python
        run: |
          import os
          from datetime import datetime, timezone, timedelta

          target = "${{ github.event.inputs.target || '' }}"
          schedule = "${{ github.event.schedule || '' }}"
          today = datetime.now(timezone(timedelta(hours=8))).strftime("%m-%d")

          run_salary = "false"
          run_welfare = "false"

          if target == "all":
              run_salary = "true"
              run_welfare = "true"
          elif target == "salary":
              run_salary = "true"
          elif target == "welfare":
              run_welfare = "true"
          elif schedule == "10 1 * 6,7 *":
              # A: 6/25～7/25 Taiwan date window
              if "06-24" < today < "07-26":
                  run_salary = "true"
          elif schedule == "40 1 1 * *":
              # B: monthly
              run_welfare = "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"run_salary={run_salary}\n")
              fh.write(f"run_welfare={run_welfare}\n")

          print(f"Taiwan date: {today}")
          print(f"Run salary: {run_salary}")
          print(f"Run welfare: {run_welfare}")

      - name: Update salary disclosure JSON
        if: steps.decide.outputs.run_salary == 'true'
        run: python scripts/update_employee_salary.py

      - name: Update welfare disclosure JSON
        if: steps.decide.outputs.run_welfare == 'true'
        run: python scripts/update_employee_welfare.py

      - name: Commit updated JSON
        shell: bash
        run: |
          set -e
          if git diff --quiet -- data/*.json; then
            echo "No JSON changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update MOPS HR disclosure data"
          git push
